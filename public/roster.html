// === MANAGE DJs ===
let manageDJs = [];

async function loadManageDJs() {
  if (!adminPassword) { showToast('Admin login required', 'error'); return; }
  const manageEl = $('manageContent');
  manageEl.style.display = 'block';
  $('mainContent').style.display = 'none';
  manageEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading DJs...</div>';
  try {
    const res = await fetch('/api/admin/djs', { headers: { 'x-admin-password': adminPassword } });
    const data = await res.json();
    if (!data.success) { showToast(data.error || 'Error loading DJs', 'error'); return; }
    manageDJs = data.djs || [];
    renderManageDJs(manageDJs);
  } catch(e) {
    manageEl.innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function isLocked(dj) {
  return dj.locked_until && new Date(dj.locked_until) > new Date();
}

function renderManageDJs(djs) {
  const manageEl = $('manageContent');
  const rows = djs.map(dj => {
    const typeCap = dj.type ? dj.type.charAt(0).toUpperCase() + dj.type.slice(1) : '';
    const statusBadge = dj.active
      ? '<span class="badge-active">Active</span>'
      : '<span class="badge-inactive">Inactive</span>';
    const lockoutBadge = isLocked(dj)
      ? `<span class="badge-locked">Locked (${dj.failed_attempts || 0} attempts)</span>`
      : '';
    const clearLockoutBtn = isLocked(dj)
      ? `<button class="manage-btn danger" onclick="clearDJLockoutUI('${dj.id}', '${dj.name.replace(/'/g, "\\'")}')">Clear Lockout</button>`
      : '';
    const djJson = JSON.stringify({ id: dj.id, name: dj.name, rate: dj.rate, type: dj.type, active: dj.active }).replace(/'/g, '&#39;');
    return `<tr>
      <td>${dj.name}</td>
      <td>${dj.rate !== null && dj.rate !== undefined ? Math.round(dj.rate) : ''}</td>
      <td>${typeCap}</td>
      <td>${statusBadge}</td>
      <td>${lockoutBadge}</td>
      <td>
        <button class="manage-btn" onclick='openEditDJModal(${djJson})'>Edit</button>
        <button class="manage-btn" onclick="toggleDJActive('${dj.id}', ${dj.active})">${dj.active ? 'Deactivate' : 'Reactivate'}</button>
        <button class="manage-btn" onclick="resetDJPin('${dj.id}', '${dj.name.replace(/'/g, "\\'")}')">Reset PIN</button>
        ${clearLockoutBtn}
        <button class="manage-btn" onclick="openAvailabilityGrid(manageDJs.find(d => d.id === '${dj.id}'))">Availability</button>
        <button class="manage-btn" onclick="openFixedScheduleGrid(manageDJs.find(d => d.id === '${dj.id}'))">Fixed Schedule</button>
      </td>
    </tr>`;
  }).join('');

  manageEl.innerHTML = `<div class="manage-djs-wrap">
    <form class="manage-add-form" onsubmit="addNewDJ(event)">
      <input id="addDJName" type="text" placeholder="DJ Name" required>
      <input id="addDJRate" type="number" placeholder="Rate" min="0" required>
      <select id="addDJType">
        <option value="resident">Resident</option>
        <option value="guest">Guest</option>
        <option value="casual">Casual</option>
      </select>
      <input id="addDJPin" type="text" placeholder="PIN" required>
      <button type="submit">Add DJ</button>
    </form>
    <table class="manage-djs-table">
      <thead><tr>
        <th>Name</th><th>Rate</th><th>Type</th><th>Status</th><th>Lockout</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

async function addNewDJ(e) {
  e.preventDefault();
  const name = $('addDJName').value.trim();
  const rate = parseInt($('addDJRate').value, 10);
  const type = $('addDJType').value;
  const pin  = $('addDJPin').value.trim();
  if (!name || !pin || isNaN(rate)) { showToast('Please fill in all fields', 'error'); return; }
  try {
    const res = await fetch('/api/admin/djs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ name, rate, type, pin })
    });
    const data = await res.json();
    if (!data.success) { showToast(data.error || 'Error adding DJ', 'error'); return; }
    showToast(`${name} added`, 'success');
    $('addDJName').value = '';
    $('addDJRate').value = '';
    $('addDJPin').value = '';
    loadManageDJs();
  } catch(e) {
    showToast('Connection error', 'error');
  }
}

function openEditDJModal(dj) {
  const overlay = document.createElement('div');
  overlay.className = 'manage-edit-overlay';
  overlay.id = 'editDJOverlay';
  overlay.innerHTML = `<div class="manage-edit-modal">
    <h3>Edit DJ: ${dj.name}</h3>
    <label>Name<input id="editDJName" type="text" value="${dj.name.replace(/"/g, '&quot;')}"></label>
    <label>Rate<input id="editDJRate" type="number" value="${dj.rate !== null && dj.rate !== undefined ? Math.round(dj.rate) : ''}"></label>
    <label>Type<select id="editDJType">
      <option value="resident"${dj.type === 'resident' ? ' selected' : ''}>Resident</option>
      <option value="guest"${dj.type === 'guest' ? ' selected' : ''}>Guest</option>
      <option value="casual"${dj.type === 'casual' ? ' selected' : ''}>Casual</option>
    </select></label>
    <div class="modal-actions">
      <button class="manage-btn" onclick="document.getElementById('editDJOverlay').remove()">Cancel</button>
      <button class="manage-btn" style="background:var(--teal);border-color:var(--teal);color:#fff" onclick="saveEditDJ('${dj.id}')">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function saveEditDJ(id) {
  const name = $('editDJName').value.trim();
  const rate = parseInt($('editDJRate').value, 10);
  const type = $('editDJType').value;
  if (!name || isNaN(rate)) { showToast('Name and rate are required', 'error'); return; }
  try {
    const res = await fetch(`/api/admin/djs/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ name, rate, type })
    });
    const data = await res.json();
    if (!data.success) { showToast(data.error || 'Error saving DJ', 'error'); return; }
    showToast('DJ updated', 'success');
    const overlay = $('editDJOverlay');
    if (overlay) overlay.remove();
    loadManageDJs();
  } catch(e) {
    showToast('Connection error', 'error');
  }
}

async function toggleDJActive(id, currentActive) {

      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ active: !currentActive })

    showToast(currentActive ? 'DJ deactivated' : 'DJ reactivated', 'success');

    showToast('Connection error', 'error');

async function resetDJPin(id, name) {

    const res = await fetch(`/api/admin/djs/${id}/pin`, {

    });

    if (!data.success) { showToast(data.error || 'Error resetting PIN', 'error'); return; }
    showToast(`PIN reset for ${name}`, 'success');
  } catch(e) {
    showToast('Connection error', 'error');
  }
}

async function clearDJLockoutUI(id, name) {

// === RECURRING AVAILABILITY GRID ===

function openAvailabilityGrid(dj) {
  if (!dj) { showToast('DJ data not found', 'error'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'manage-edit-overlay';
  overlay.id = 'availGridOverlay';

  const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const slots = ARKBAR_SLOTS;
  const avail = dj.recurring_availability || {};

  let headerCells = '<th style="text-align:left;padding:4px 6px;color:var(--text-secondary);font-size:11px">Slot</th>';
  DAY_NAMES.forEach(d => { headerCells += `<th>${d}</th>`; });

  let rows = '';
  slots.forEach((slot, si) => {
    let cells = `<td style="text-align:left;padding:4px 8px;font-size:11px;color:var(--text-secondary);white-space:nowrap">${slot}</td>`;
    for (let dow = 0; dow < 7; dow++) {
      const daySlots = Array.isArray(avail[String(dow)]) ? avail[String(dow)] : [];
      const checked = daySlots.includes(slot) ? ' checked' : '';
      cells += `<td><input type="checkbox" id="avail-${dow}-${si}"${checked}></td>`;
    }
    rows += `<tr>${cells}</tr>`;
  });

  overlay.innerHTML = `<div class="manage-edit-modal" style="max-width:700px;width:95vw">
    <h3>Recurring Availability: ${dj.name.replace(/</g, '&lt;')}</h3>
    <div style="margin-bottom:8px"><button class="manage-btn" onclick="toggleAllCheckboxes('avail',${slots.length},7,this)">Select All</button></div>
    <div style="overflow-x:auto">
      <table class="avail-grid">
        <thead><tr>${headerCells}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="modal-actions">
      <button class="manage-btn" onclick="document.getElementById('availGridOverlay').remove()">Cancel</button>
      <button class="manage-btn" style="background:var(--teal);border-color:var(--teal);color:#fff" onclick="saveAvailability('${dj.id}')">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function saveAvailability(djId) {
  const recurring_availability = {};
  for (let dow = 0; dow < 7; dow++) {
    recurring_availability[String(dow)] = [];
    ARKBAR_SLOTS.forEach((slot, si) => {
      const cb = document.getElementById(`avail-${dow}-${si}`);
      if (cb && cb.checked) recurring_availability[String(dow)].push(slot);
    });
  }
  try {
    const res = await fetch(`/api/admin/djs/${djId}/recurring-availability`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ recurring_availability })
    });
    const data = await res.json();
    if (!data.success) { showToast(data.error || 'Error saving availability', 'error'); return; }
    showToast('Availability saved', 'success');
    const overlay = document.getElementById('availGridOverlay');
    if (overlay) overlay.remove();
    loadManageDJs();
  } catch(e) {
    showToast('Connection error', 'error');
  }
}

function toggleAllCheckboxes(prefix, totalSlots, totalDays, btn) {
  const allChecked = [];
  for (let d = 0; d < totalDays; d++) {
    for (let s = 0; s < totalSlots; s++) {
      const cb = document.getElementById(`${prefix}-${d}-${s}`);
      if (cb && !cb.disabled) allChecked.push(cb);
    }
  }
  const selectAll = allChecked.some(cb => !cb.checked);
  allChecked.forEach(cb => { cb.checked = selectAll; });
  btn.textContent = selectAll ? 'Deselect All' : 'Select All';
}

// === FIXED SCHEDULE GRID ===

function openFixedScheduleGrid(dj) {
  if (!dj) { showToast('DJ data not found', 'error'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'manage-edit-overlay';
  overlay.id = 'fixedGridOverlay';

  const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const schedules = dj.fixed_schedules || {};
  const arkData = schedules.arkbar || {};
  const loveData = schedules.loveBeach || {};

  // ARKbar section
  let arkHeaderCells = '<th style="text-align:left;padding:4px 6px;color:var(--text-secondary);font-size:11px">Slot</th>';
  DAY_NAMES.forEach(d => { arkHeaderCells += `<th>${d}</th>`; });

  let arkRows = '';
  ARKBAR_SLOTS.forEach((slot, si) => {
    let cells = `<td style="text-align:left;padding:4px 8px;font-size:11px;color:var(--text-secondary);white-space:nowrap">${slot}</td>`;
    for (let dow = 0; dow < 7; dow++) {
      const daySlots = Array.isArray(arkData[String(dow)]) ? arkData[String(dow)] : [];
      const checked = daySlots.includes(slot) ? ' checked' : '';
      cells += `<td><input type="checkbox" id="fixed-arkbar-${dow}-${si}"${checked}></td>`;
    }
    arkRows += `<tr>${cells}</tr>`;
  });

  // Love Beach section — use LOVE_SAT_SLOTS as rows (superset), disable non-weekday slots for non-Saturday days
  let loveHeaderCells = '<th style="text-align:left;padding:4px 6px;color:var(--text-secondary);font-size:11px">Slot</th>';
  DAY_NAMES.forEach(d => { loveHeaderCells += `<th>${d}</th>`; });

  let loveRows = '';
  LOVE_SAT_SLOTS.forEach((slot, si) => {
    let cells = `<td style="text-align:left;padding:4px 8px;font-size:11px;color:var(--text-secondary);white-space:nowrap">${slot}</td>`;
    const isSatOnlySlot = !LOVE_WEEKDAY_SLOTS.includes(slot);
    for (let dow = 0; dow < 7; dow++) {
      const isSatCol = (dow === 6);
      const isDisabled = isSatOnlySlot && !isSatCol;
      const daySlots = Array.isArray(loveData[String(dow)]) ? loveData[String(dow)] : [];
      const checked = (!isDisabled && daySlots.includes(slot)) ? ' checked' : '';
      const disabledAttr = isDisabled ? ' disabled' : '';
      const tdClass = isDisabled ? ' class="disabled-slot"' : '';
      cells += `<td${tdClass}><input type="checkbox" id="fixed-love-${dow}-${si}"${checked}${disabledAttr}></td>`;
    }
    loveRows += `<tr>${cells}</tr>`;
  });

  overlay.innerHTML = `<div class="manage-edit-modal" style="max-width:800px;width:95vw">
    <h3>Fixed Schedule: ${dj.name.replace(/</g, '&lt;')}</h3>
    <div style="display:flex;align-items:center;justify-content:space-between"><div class="avail-section-heading teal" style="margin:0">ARKbar Beach Club</div><button class="manage-btn" onclick="toggleAllCheckboxes('fixed-arkbar',${ARKBAR_SLOTS.length},7,this)">Select All</button></div>
    <div style="overflow-x:auto">
      <table class="avail-grid">
        <thead><tr>${arkHeaderCells}</tr></thead>
        <tbody>${arkRows}</tbody>
      </table>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between"><div class="avail-section-heading pink" style="margin:0">Love Beach Club</div><button class="manage-btn" onclick="toggleAllCheckboxes('fixed-love',${LOVE_SAT_SLOTS.length},7,this)">Select All</button></div>
    <div style="overflow-x:auto">
      <table class="avail-grid">
        <thead><tr>${loveHeaderCells}</tr></thead>
        <tbody>${loveRows}</tbody>
      </table>
    </div>
    <div class="modal-actions">
      <button class="manage-btn" onclick="document.getElementById('fixedGridOverlay').remove()">Cancel</button>
      <button class="manage-btn" style="background:var(--teal);border-color:var(--teal);color:#fff" onclick="saveFixedSchedule('${dj.id}')">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function saveFixedSchedule(djId) {
  const arkbar = {};
  for (let dow = 0; dow < 7; dow++) {
    arkbar[String(dow)] = [];
    ARKBAR_SLOTS.forEach((slot, si) => {
      const cb = document.getElementById(`fixed-arkbar-${dow}-${si}`);
      if (cb && cb.checked) arkbar[String(dow)].push(slot);
    });
  }

  const loveBeach = {};
  for (let dow = 0; dow < 7; dow++) {
    loveBeach[String(dow)] = [];
    LOVE_SAT_SLOTS.forEach((slot, si) => {
      const cb = document.getElementById(`fixed-love-${dow}-${si}`);
      if (cb && cb.checked && !cb.disabled) loveBeach[String(dow)].push(slot);
    });
  }

  try {
    const res = await fetch(`/api/admin/djs/${djId}/fixed-schedules`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify({ fixed_schedules: { arkbar, loveBeach } })
    });
    const data = await res.json();
    if (!data.success) { showToast(data.error || 'Error saving fixed schedule', 'error'); return; }
    showToast('Fixed schedule saved', 'success');
    const overlay = document.getElementById('fixedGridOverlay');
    if (overlay) overlay.remove();
    loadManageDJs();
  } catch(e) {
    showToast('Connection error', 'error');
  }
}

// === HOURS PANEL (sidebar) ===
function toggleHoursPanel() {
  $('hoursPanel').classList.toggle('open');
  $('hoursPanelOverlay').classList.toggle('open');
}

function updateHoursPanel() {
  const body = $('hoursPanelBody');
  if (!body) return;
  const resHours = {};
  RESIDENTS.forEach(r => { resHours[r] = 0; });
  [arkbarAssignments, hipAssignments, loveAssignments].forEach(map => {
    Object.values(map).forEach(dj => { if (resHours[dj] !== undefined) resHours[dj]++; });
  });

  let html = '';
  RESIDENTS.forEach(r => {
    const h = resHours[r];
    const t = TARGETS[r];
    const pct = Math.min(h / t * 100, 100);
    const cls = h > t ? 'over' : h >= t * 0.9 ? 'warn' : 'ok';
    const color = getDJColor(r) || '#aaa';
    html += `<div class="hp-row">
      <div class="hp-dot" style="background:${color}"></div>
      <div class="hp-name">${r}</div>
      <div class="hp-hours">${h}h</div>
      <div class="hp-target">/${t}</div>
    </div>
    <div style="padding:0 0 10px 16px"><div class="hp-bar"><div class="hp-bar-fill ${cls}" style="width:${pct}%"></div></div></div>`;
  });
  body.innerHTML = html;
}

// === TOAST ===
function showToast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), type === 'error' ? 4000 : 2500);
}
</script>
