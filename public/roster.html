// === HOURS TAB ===
async function loadHours() {
  $('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>Loading hours...</div>';
  const month = getMonthString();
  try {
    const enc = encodeURIComponent;
    const [arkRes, loveRes, djRes, signoffRes] = await Promise.all([
      fetch(`/api/roster?venue=arkbar&month=${enc(month)}`),
      fetch(`/api/roster?venue=love&month=${enc(month)}`),
      fetch('/api/djs'),
      fetch(`/api/signoffs/${enc(month)}`, { headers: { 'x-admin-password': adminPassword } }),
    ]);
    const [arkData, loveData, djData, signoffData] = await Promise.all([arkRes.json(), loveRes.json(), djRes.json(), signoffRes.json()]);
    const scheduledHours = {};
    (arkData.roster || []).forEach(r => { if (r[2] && r[2] !== 'Guest DJ') scheduledHours[r[2]] = (scheduledHours[r[2]] || 0) + 1; });
    (loveData.roster || []).forEach(r => { if (r[2] && r[2] !== 'Guest DJ') scheduledHours[r[2]] = (scheduledHours[r[2]] || 0) + 1; });
    const signedOffHours = signoffData.signedOff || {};

    renderHours(djData.djs || [], scheduledHours, signedOffHours);
  } catch(e) {
    $('mainContent').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function renderHours(djs, scheduledHours, signedOffHours) {
  checkFinalized();
  const normalize = name => name ? name.trim().toLowerCase() : '';

  const schedNorm = {}, signNorm = {};
  Object.entries(scheduledHours).forEach(([k,v]) => { schedNorm[normalize(k)] = v; });
  Object.entries(signedOffHours).forEach(([k,v]) => { signNorm[normalize(k)] = v; });

  const scheduled = {}, signedOff = {};
  djs.forEach(d => {
    if (d.name === 'Guest DJ') { scheduled[d.name] = 0; signedOff[d.name] = 0; return; }
    scheduled[d.name] = schedNorm[normalize(d.name)] || 0;
    signedOff[d.name] = signNorm[normalize(d.name)] || 0;
  });

  const totalScheduled = Object.values(scheduled).reduce((a,b) => a + b, 0);
  const totalSignedOff = Object.values(signedOff).reduce((a,b) => a + b, 0);
  const totalCost = djs.reduce((sum,d) => sum + (signedOff[d.name] || 0) * d.rate, 0);
  const maxHours = Math.max(...Object.values(scheduled), RESIDENT_TARGET);

  const sorted = [...djs].sort((a,b) => {
    const aR = RESIDENTS.includes(a.name) ? 1 : 0;
    const bR = RESIDENTS.includes(b.name) ? 1 : 0;
    if (aR !== bR) return bR - aR;
    return (scheduled[b.name] || 0) - (scheduled[a.name] || 0);
  });

  const rows = sorted.map(dj => {
    const sched = scheduled[dj.name] || 0;
    const signed = signedOff[dj.name] || 0;
    const isResident = RESIDENTS.includes(dj.name);
    const has80Target = RESIDENTS_80HR.includes(dj.name);
    const pct = maxHours > 0 ? Math.min(sched / maxHours * 100, 100) : 0;
    const cost = dj.name === 'Guest DJ' ? 0 : signed * dj.rate;
    const barClass = `hours-bar-fill${isResident ? ' resident' : sched === 0 ? ' zero' : ''}`;
    const isSoundBogie = dj.name === 'Sound Bogie';
    const djTarget = isSoundBogie ? 35 : has80Target ? RESIDENT_MIN : RESIDENT_TARGET;
    const djTargetLabel = isSoundBogie ? '30\u201340' : has80Target ? RESIDENT_MIN : RESIDENT_TARGET;
    let badge = '';
    if (has80Target || isSoundBogie) {
      badge = sched >= djTarget
        ? `<span class="badge badge-ok">${sched}/${djTargetLabel}h \u2713</span>`
        : `<span class="badge badge-low">${sched}/${djTargetLabel}h</span><span class="badge-needed">${djTarget - sched}h needed</span>`;
    }
    const editBtn = `<button class="dj-edit-btn" title="Edit name/rate" onclick="event.stopPropagation();editDJ('${dj.name.replace(/'/g,"\\'")}',${dj.rate})">&#9998;</button>`;
    return `<tr>
      <td><div class="dj-name-cell" style="cursor:pointer" onclick="showDJDetail('${dj.name.replace(/'/g,"\\'")}')">
        <div class="dj-dot" style="background:${getDJColor(dj.name)||'#aaa'}"></div>
        <div>
          <div class="dj-name" style="text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;display:flex;align-items:center;gap:4px">${dj.name}${editBtn}</div>
          ${isResident ? '<div style="font-size:9px;color:var(--teal);font-weight:800;text-transform:uppercase;letter-spacing:.06em">Resident</div>' : ''}
        </div>
      </div></td>
      <td class="right">${sched > 0 ? sched + 'h' : '\u2014'}</td>
      <td class="right">${signed > 0 ? signed + 'h' : '\u2014'}</td>
      <td><div class="hours-bar-wrap">
        <div class="hours-bar-bg"><div class="${barClass}" style="width:${pct}%"></div></div>
        <div class="hours-val">${sched}h</div>${badge}
      </div></td>
      <td class="right" style="color:var(--text-secondary)">\u0E3F${dj.rate.toLocaleString()}/h</td>
      <td class="right" style="font-weight:800;color:var(--navy)">${cost > 0 ? '\u0E3F' + cost.toLocaleString() : '\u2014'}</td>
    </tr>`;
  }).join('');

  const belowMin = RESIDENTS_80HR.filter(r => (scheduled[r] || 0) < RESIDENT_MIN);
  const minWarning = belowMin.length
    ? `<div class="hours-min-warning">&#9888; Minimum ${RESIDENT_MIN}h not met: ${belowMin.map(r => `${r} (${scheduled[r]||0}h)`).join(', ')}</div>`
    : '';

  $('mainContent').innerHTML = `<div class="hours-wrap">
    ${minWarning}
    <div class="summary-row">
      <div class="summary-card"><div class="card-label">Scheduled</div><div class="card-value">${totalScheduled}h</div><div class="card-sub">${getMonthString()}</div></div>
      <div class="summary-card"><div class="card-label">Signed Off</div><div class="card-value">${totalSignedOff}h</div><div class="card-sub">${getMonthString()}</div></div>
      <div class="summary-card"><div class="card-label">Total Cost</div><div class="card-value" style="font-size:20px">\u0E3F${totalCost.toLocaleString()}</div><div class="card-sub">Signed-off hours only</div></div>
    </div>
    <div class="hours-table-wrap">
      <div class="hours-table-header">
        <h2>Hours by DJ \u2014 ${getMonthString()}</h2>
        <div style="display:flex;align-items:center;gap:8px" id="finalizeArea">
          <button class="finalize-btn" id="finalizeBtn" onclick="previewMonth()">Finalise Month</button>
        </div>
      </div>
      <table class="hours-table">
        <thead><tr><th>DJ</th><th class="right">Scheduled</th><th class="right">Signed Off</th><th>Hours Bar</th><th class="right">Rate</th><th class="right">Cost (signed)</th></tr></thead>
        <tbody>${rows}
          <tr class="totals-row">
            <td>Total</td><td class="right">${totalScheduled}h</td><td class="right">${totalSignedOff}h</td>
            <td></td>
            <td></td><td class="right" style="font-size:14px;color:var(--navy)">\u0E3F${totalCost.toLocaleString()}</td>
          </tr>
        </tbody>
      </table>
      <div class="target-note">Targets: Alex RedWhite &amp; Raffo DJ \u2014 ${RESIDENT_TARGET}h/month (min ${RESIDENT_MIN}h) \u00B7 Sound Bogie \u2014 30\u201340h/month</div>
    </div>
  </div>`;
}

// === DJ DETAIL MODAL ===
async function showDJDetail(djName) {
  const month = getMonthString();
  const enc = encodeURIComponent;
  const [arkRes, hipRes, loveRes, signoffRes] = await Promise.all([
    fetch(`/api/roster?venue=arkbar&month=${enc(month)}`).then(r=>r.json()),
    fetch(`/api/roster?venue=hip&month=${enc(month)}`).then(r=>r.json()),
    fetch(`/api/roster?venue=love&month=${enc(month)}`).then(r=>r.json()),
    fetch(`/api/dj/signoffs/${enc(djName)}/${enc(month)}`).then(r=>r.json()).catch(()=>({signoffs:[]})),
  ]);

  const signoffSet = new Set((signoffRes.signoffs || []).map(s => `${s.date}|${s.slot}|${s.venue}`));
  const VENUE_LABEL = { arkbar:'ARKbar', hip:'HIP', love:'Love Beach' };

  const norm = n => n ? n.trim().toLowerCase() : '';
  const djNorm = norm(djName);
  const dayData = {};
  function addSlots(rows, venue) {
    (rows || []).forEach(r => {
      if (norm(r[2]) !== djNorm) return;
      if (!dayData[r[0]]) dayData[r[0]] = { arkbar:[], hip:[], love:[] };
      dayData[r[0]][venue].push(r[1]);
    });
  }
  addSlots(arkRes.roster, 'arkbar');
  addSlots(hipRes.roster, 'hip');
  addSlots(loveRes.roster, 'love');

  const dates = Object.keys(dayData).sort();
  let arkTotal = 0, hipTotal = 0, loveTotal = 0;
  const djInfo = (djList || []).find(d => d.name === djName);
  const rate = djInfo ? djInfo.rate : 0;
  const color = getDJColor(djName) || '#aaa';

  const formatSlots = slots => slots.length > 0
    ? `<div class="dj-slot-cell">${slots.map(s => `<span class="dj-slot-tag">${s}</span>`).join('')}</div>`
    : '<span style="color:var(--text-faint)">\u2014</span>';

  let tableRows = '';
  let grandSignedCount = 0;
  dates.forEach(date => {
    const d = dayData[date];
    const dow = new Date(date).getDay();
    const dayLabel = `${DAYS[dow]} ${date.split('-')[2]} ${MONTHS[currentMonth].slice(0,3)}`;
    const as = d.arkbar.sort(), hs = d.hip.sort(), ls = d.love.sort();
    arkTotal += as.length; hipTotal += hs.length; loveTotal += ls.length;
    const dayTotal = as.length + hs.length + ls.length;
    const signedCount = [['arkbar',as],['hip',hs],['love',ls]].reduce(
      (sum, [vk, slots]) => sum + slots.filter(s => signoffSet.has(`${date}|${s}|${VENUE_LABEL[vk]}`)).length, 0);
    grandSignedCount += signedCount;
    let signoffCell = '\u2014';
    if (signedCount > 0) {
      const all = signedCount === dayTotal;
      const col = all ? '#69f0ae' : '#ffb74d';
      const bg  = all ? 'rgba(105,240,174,0.12)' : 'rgba(255,183,77,0.12)';
      const brd = all ? 'rgba(105,240,174,0.3)'  : 'rgba(255,183,77,0.3)';
      signoffCell = `<span style="background:${bg};border:1px solid ${brd};color:${col};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:800;white-space:nowrap">${signedCount}/${dayTotal}h signed</span>`;
    }
    tableRows += `<tr style="border-bottom:1px solid var(--border-subtle)">
      <td style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--text-muted);white-space:nowrap">${dayLabel}</td>
      <td style="padding:8px 6px;font-size:10px">${formatSlots(as)}</td>
      <td style="padding:8px 6px;font-size:10px">${formatSlots(hs)}</td>
      <td style="padding:8px 6px;font-size:10px">${formatSlots(ls)}</td>
      <td style="padding:8px 12px;text-align:right;color:var(--text-faint)">${signoffCell}</td>
      <td style="padding:8px 12px;font-size:12px;font-weight:800;color:#fff;text-align:right">${dayTotal}h</td>
    </tr>`;
  });

  const grandTotal = arkTotal + hipTotal + loveTotal;
  const totalCost = djName === 'Guest DJ' ? 0 : grandSignedCount * rate;

  const modal = document.createElement('div');
  modal.id = 'djDetailModal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:fadeUp .2s ease';
  modal.innerHTML = `<div id="djDetailContent" style="background:rgba(15,20,45,0.98);border:1px solid rgba(93,184,192,0.3);border-radius:var(--radius-lg);width:min(800px,100%);max-height:calc(100vh - 32px);overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.6)">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:12px;height:12px;border-radius:50%;background:${color}"></div>
        <div>
          <div style="font-size:18px;font-weight:900">${djName}</div>
          <div style="font-size:11px;color:var(--text-muted);font-weight:600">${month} \u00B7 \u0E3F${rate.toLocaleString()}/h</div>
        </div>
      </div>
      <div class="dj-detail-actions" style="display:flex;gap:8px">
        <button onclick="printDJDetail()" style="padding:8px 16px;border-radius:var(--radius-sm);background:rgba(46,125,50,0.3);border:1px solid rgba(46,125,50,0.5);color:#69f0ae;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">\uD83D\uDDA8 Print</button>

      </div>
    </div>
    <div class="dj-detail-stat-grid">
      <div style="background:rgba(93,184,192,0.1);border:1px solid rgba(93,184,192,0.25);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em">ARKbar/HIP</div>
        <div style="font-size:22px;font-weight:900">${arkTotal+hipTotal}h</div>
      </div>
      <div style="background:rgba(233,30,140,0.08);border:1px solid rgba(233,30,140,0.2);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em">Love Beach</div>
        <div style="font-size:22px;font-weight:900">${loveTotal}h</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em">Total</div>

      <button onclick="saveDJEdit()" style="flex:1;padding:12px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;background:var(--teal);border:none;color:#0b1020">Save</button>

function closeDJEdit() { const m = $('djEditModal'); if (m) m.remove(); }
async function saveDJEdit() {
  const newName = ($('djEditName').value || '').trim();
  const rate = parseInt($('djEditRate').value);
  const errEl = $('djEditErr');
  if (!newName) { errEl.textContent = 'Name cannot be empty.'; errEl.style.display = 'block'; return; }
  if (isNaN(rate) || rate < 0) { errEl.textContent = 'Enter a valid rate.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  try {
    const data = await fetch('/api/djs/update', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oldName: _editingDJOrig, newName, rate, password: adminPassword }),
    }).then(r => r.json());
    if (data.success) { closeDJEdit(); showToast(`${newName} updated`, 'success'); loadHours(); }
    else { errEl.textContent = data.error || 'Save failed.'; errEl.style.display = 'block'; }
  } catch(e) {
    errEl.textContent = 'Connection error.'; errEl.style.display = 'block';
  }
}

// === FINALIZE MONTH ===
async function checkFinalized() {
  const btn = $('finalizeBtn');
  const area = $('finalizeArea');
  if (!btn || !area) return;
  try {
    const month = getMonthString();
    const data = await fetch(`/api/finalized?month=${encodeURIComponent(month)}`).then(r => r.json());
    if (data.isFinalized) {
      area.innerHTML = `<span class="finalized-pill">&#128274; Finalised</span>`;
    } else {
      btn.disabled = false;
    }
  } catch(e) { /* silently ignore */ }
}

async function previewMonth() {
  const month = getMonthString();
  const enc = encodeURIComponent;
  const norm = n => n ? n.trim().toLowerCase() : '';
  try {
    const [arkRes, hipRes, loveRes, djRes, soRes] = await Promise.all([
      fetch(`/api/roster?venue=arkbar&month=${enc(month)}`).then(r => r.json()),
      fetch(`/api/roster?venue=hip&month=${enc(month)}`).then(r => r.json()),
      fetch(`/api/roster?venue=love&month=${enc(month)}`).then(r => r.json()),
      fetch('/api/djs').then(r => r.json()),
      fetch(`/api/signoffs/${enc(month)}`, { headers: { 'x-admin-password': adminPassword } }).then(r => r.json()).catch(() => ({ signedOff: {} })),
    ]);
    const signedOffMap = soRes.signedOff || {};
    const djs = djRes.djs || [];
    const arkNorm = {}, hipNorm = {}, loveNorm = {};
    (arkRes.roster || []).forEach(r => { if (r[2]) { const k = norm(r[2]); arkNorm[k] = (arkNorm[k]||0)+1; } });
    (hipRes.roster || []).forEach(r => { if (r[2]) { const k = norm(r[2]); hipNorm[k] = (hipNorm[k]||0)+1; } });
    (loveRes.roster || []).forEach(r => {
      if (!r[2]) return;
      const djName = r[2];
      if (djName !== 'Guest DJ' && !RESIDENTS.includes(djName)) {
        const slotAvail = (availability[r[0]] && availability[r[0]][normalizeSlot(r[1])]) || [];
        if (!slotAvail.includes(djName)) return; // no confirmed availability → exclude
      }
      const k = norm(djName);
      loveNorm[k] = (loveNorm[k] || 0) + 1;
    });
    const report = djs
      .map(dj => {
        const ark  = arkNorm[norm(dj.name)]  || 0;
        const hip  = hipNorm[norm(dj.name)]  || 0;
        const love = loveNorm[norm(dj.name)] || 0;
        const total = ark + hip + love;
        const signedOff = signedOffMap[dj.name] || 0;
        const cost = dj.name === 'Guest DJ' ? 0 : signedOff * dj.rate;
        return { name: dj.name, arkbar: ark, hip, love, total, rate: dj.rate, cost, signedOff };
      })
      .filter(dj => dj.total > 0 && dj.name !== 'Guest DJ' && submittedDJs.get(dj.name) === 'submitted')
      .sort((a, b) => b.total - a.total);
    const grandTotal = report.reduce((s, d) => s + d.total, 0);
    const grandCost  = report.reduce((s, d) => s + d.cost,  0);
    showFinalizeReport({ month, report, grandTotal, grandCost }, true);
  } catch(e) {
    showToast('Preview error: ' + e.message, 'error');
  }
}

async function finalizeMonth() {
  const month = getMonthString();
  if (!confirm(`Finalise ${month}?\n\nThis will lock the month — DJs will no longer be able to edit availability for this period.\n\nThis cannot be undone.`)) return;

  const btn = $('finalizeBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Finalising…'; }

  try {
    const data = await fetch('/api/roster/finalize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month, password: adminPassword }),
    }).then(r => r.json());

    if (data.success) {
      showToast(`${month} finalised`, 'success');
      const area = $('finalizeArea');
      if (area) area.innerHTML = `<span class="finalized-pill">&#128274; Finalised</span>`;
      // Fetch signoffs and inject into report before showing
      try {
        const soRes = await fetch(`/api/signoffs/${encodeURIComponent(month)}`, { headers: { 'x-admin-password': adminPassword } }).then(r => r.json());
        const soMap = soRes.signedOff || {};
        if (data.report) data.report = data.report.map(dj => ({ ...dj, signedOff: soMap[dj.name] || 0 }));
      } catch(e) { /* non-fatal — signedOff will default to 0 */ }
      showFinalizeReport(data);
    } else {
      showToast(data.error || 'Finalise failed', 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Finalise Month'; }
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Finalise Month'; }
  }
}

function showFinalizeReport(data, isPreview = false) {
  const { month } = data;
  const BAHT = '\u0E3F';

  // Exclude DJs who haven't submitted availability and zero-hour entries
  const report = (data.report || []).filter(dj =>
    dj.total > 0 && dj.name !== 'Guest DJ' && submittedDJs.get(dj.name) === 'submitted'
  );
  // Normalise cost to signedOff × rate so both preview and finalise paths agree
  const reportWithCost = report.map(dj => ({ ...dj, cost: (dj.signedOff || 0) * (dj.rate || 0) }));
  const grandTotal     = reportWithCost.reduce((s, d) => s + d.total, 0);
  const grandCost      = reportWithCost.reduce((s, d) => s + d.cost,  0);
  const grandSignedOff = reportWithCost.reduce((s, d) => s + (d.signedOff || 0), 0);
  const soCol = (so, tot) => so >= tot ? '#69f0ae' : so > 0 ? '#ffb74d' : 'rgba(255,255,255,0.3)';

  const rows = reportWithCost.map(dj => `<tr>
    <td style="font-weight:700;color:#fff">${dj.name}</td>
    <td class="r">${dj.arkbar > 0 ? dj.arkbar + 'h' : '\u2014'}</td>
    <td class="r">${dj.hip   > 0 ? dj.hip   + 'h' : '\u2014'}</td>
    <td class="r">${dj.love  > 0 ? dj.love  + 'h' : '\u2014'}</td>
    <td class="r"><strong>${dj.total}h</strong></td>
    <td class="r" style="color:${soCol(dj.signedOff||0,dj.total)};font-weight:700">${dj.signedOff||0}/${dj.total}h</td>
    <td class="fin-col-rate r">${BAHT}${dj.rate.toLocaleString()}/h</td>
    <td class="fin-col-cost r" style="color:var(--teal);font-weight:800">${BAHT}${dj.cost.toLocaleString()}</td>
    <td class="fin-col-combined r"><span style="font-size:10px;opacity:.65">${BAHT}${dj.rate.toLocaleString()}/h &times; ${dj.signedOff||0}h</span><br><strong style="color:var(--teal)">${BAHT}${dj.cost.toLocaleString()}</strong></td>
  </tr>`).join('');

  const headerIcon  = isPreview ? '&#128196;' : '&#128274;';
  const headerLabel = isPreview ? `${month} \u2014 Accounting Preview` : `${month} \u2014 Accounting Report`;
  const previewBanner = isPreview
    ? `<div class="preview-banner">&#9888; PREVIEW \u2014 NOT FINALISED \u2014 No data has been saved</div>`
    : '';
  const extraBtns = isPreview
    ? `<button class="finalize-btn" style="font-size:11px;padding:7px 14px" onclick="closeFinalizeModal();finalizeMonth()">&#128274; Finalise Month</button>`
    : '';

  const modal = document.createElement('div');
  modal.className = 'fin-modal-overlay';
  modal.id = 'finalizeModal';
  modal.innerHTML = `<div class="fin-modal">
    <div class="fin-modal-hdr">
      <h2>${headerIcon} ${headerLabel}</h2>
      <div class="fin-modal-hdr-btns">
        ${extraBtns}
        <button class="fin-print-btn" onclick="printFinalizeReport(${isPreview})">&#128438; ${isPreview ? 'Print Preview' : 'Print'}</button>
        <button class="fin-close-btn" onclick="closeFinalizeModal()">&#x2715;</button>
      </div>
    </div>
    <div class="fin-modal-body" id="finalizeReportBody">
      ${previewBanner}
      <div class="fin-summary">
        <div class="fin-card"><div class="fin-card-label">Total Hours</div><div class="fin-card-val">${grandTotal}h</div></div>
        <div class="fin-card"><div class="fin-card-label">Total Cost</div><div class="fin-card-val" style="color:var(--teal);font-size:18px">${BAHT}${grandCost.toLocaleString()}</div></div>
        <div class="fin-card"><div class="fin-card-label">Signed Off</div><div class="fin-card-val" style="color:${soCol(grandSignedOff,grandTotal)};font-size:16px">${grandSignedOff}/${grandTotal}h</div></div>
        <div class="fin-card"><div class="fin-card-label">DJs Paid</div><div class="fin-card-val">${report.length}</div></div>
        <div class="fin-card"><div class="fin-card-label">Period</div><div class="fin-card-val" style="font-size:13px">${month}</div></div>
      </div>
      <table class="fin-table">
        <thead><tr>
          <th>DJ</th><th class="r">ARKbar</th><th class="r">HIP</th><th class="r">Love Beach</th>
          <th class="r">Total</th><th class="r">Signed Off</th><th class="fin-col-rate r">Rate</th><th class="fin-col-cost r">Cost</th><th class="fin-col-combined r">Rate &amp; Cost</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td colspan="4">Grand Total</td>
          <td class="r">${grandTotal}h</td>
          <td class="r" style="color:${soCol(grandSignedOff,grandTotal)};font-weight:800">${grandSignedOff}/${grandTotal}h</td>
          <td class="fin-col-rate"></td>
          <td class="fin-col-cost r">${BAHT}${grandCost.toLocaleString()}</td>
          <td class="fin-col-combined r">${BAHT}${grandCost.toLocaleString()}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`;

  modal.addEventListener('click', e => { if (e.target === modal) closeFinalizeModal(); });
  document.body.appendChild(modal);
}

// === HOURS PANEL (sidebar) ===
function toggleHoursPanel() {
  $('hoursPanel').classList.toggle('open');
  $('hoursPanelOverlay').classList.toggle('open');
}

function updateHoursPanel() {
  const body = $('hoursPanelBody');
  if (!body) return;
  const resHours = {};
  RESIDENTS.forEach(r => { resHours[r] = 0; });
  [arkbarAssignments, hipAssignments, loveAssignments].forEach(map => {
    Object.values(map).forEach(dj => { if (resHours[dj] !== undefined) resHours[dj]++; });
  });

  let html = '';
  RESIDENTS.forEach(r => {
    const h = resHours[r];
    const t = TARGETS[r];
    const pct = Math.min(h / t * 100, 100);
    const cls = h > t ? 'over' : h >= t * 0.9 ? 'warn' : 'ok';
    const color = getDJColor(r) || '#aaa';
    html += `<div class="hp-row">
      <div class="hp-dot" style="background:${color}"></div>
      <div class="hp-name">${r}</div>
      <div class="hp-hours">${h}h</div>
      <div class="hp-target">/${t}</div>
    </div>
    <div style="padding:0 0 10px 16px"><div class="hp-bar"><div class="hp-bar-fill ${cls}" style="width:${pct}%"></div></div></div>`;
  });
  body.innerHTML = html;
}

// === TOAST ===
function showToast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), type === 'error' ? 4000 : 2500);
}
