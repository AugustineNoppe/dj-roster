<!DOCTYPE html>
<html lang="en"><!-- cache-bust-1 -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>DJ Roster - Admin</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#0b1020">
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* === RESET & TOKENS === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* iOS Safari: prevent auto-zoom on input focus; prevent double-tap zoom */
input,select,textarea{touch-action:manipulation}
button,a,[role="button"]{touch-action:manipulation}
:root{
  --navy:#2B3990;--navy-dark:#1a2570;--teal:#5DB8C0;--teal-light:#eaf6f7;
  --orange:#F15A29;--love-pink:#e91e8c;--love-dark:#880e4f;--love-light:#fce4ec;
  --bg:#0b1020;--surface:rgba(255,255,255,0.07);--surface-hover:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.1);--border-subtle:rgba(255,255,255,0.06);
  --text-primary:#fff;--text-secondary:rgba(255,255,255,0.7);
  --text-muted:rgba(255,255,255,0.4);--text-faint:rgba(255,255,255,0.2);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --blur:blur(20px);--shadow:0 8px 40px rgba(0,0,0,0.4);
  --transition:0.2s ease;
  --header-h:56px;--tab-h:44px;
}
html,body{height:100%}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}

/* === AMBIENT BACKGROUND === */
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;contain:strict}
.bg-orb{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform;animation:drift 14s ease-in-out infinite alternate}
.bg-orb:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,var(--navy) 0%,transparent 70%);top:-200px;left:-200px;opacity:.55}
.bg-orb:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,var(--teal) 0%,transparent 70%);bottom:-150px;right:-100px;opacity:.3;animation-delay:-5s}
.bg-orb:nth-child(3){width:350px;height:350px;background:radial-gradient(circle,var(--orange) 0%,transparent 70%);top:45%;left:55%;opacity:.12;animation-delay:-9s}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(40px,-50px)}}

/* === LOGIN === */
.login-wrap{min-height:100vh;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;padding:16px}
.login-box{
  background:var(--surface);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:48px 40px;
  width:min(360px,100%);text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.5);
  animation:fadeUp .7s ease both;
}
.login-box h1{font-size:26px;font-weight:900;margin-bottom:4px}
.login-box .subtitle{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:32px}
.login-icon{font-size:40px;margin-bottom:12px}
.pw-field{position:relative;width:100%;margin-bottom:12px}
.pw-field input{
  width:100%;padding:14px 52px 14px 18px;border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;font-family:inherit;font-size:15px;text-align:center;
  letter-spacing:.05em;outline:none;background:rgba(255,255,255,0.08);color:#fff;
  transition:border-color var(--transition),background var(--transition);
}
.pw-field input::placeholder{color:rgba(255,255,255,0.3)}
.pw-field input:focus{border-color:var(--teal);background:rgba(255,255,255,0.12)}
.pw-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;
  user-select:none;z-index:2;line-height:0;padding:6px;-webkit-tap-highlight-color:transparent;
}
.login-btn{
  width:100%;padding:14px;background:rgba(93,184,192,0.2);border:1px solid rgba(93,184,192,0.4);
  color:#fff;border-radius:10px;font-family:inherit;font-size:14px;font-weight:800;
  cursor:pointer;transition:background var(--transition),border-color var(--transition);
}
.login-btn:hover,.login-btn:focus-visible{background:rgba(93,184,192,0.35);border-color:rgba(93,184,192,0.7)}
.login-error{color:var(--orange);font-size:12px;font-weight:600;margin-top:10px;display:none}
.back-link{
  display:inline-block;margin-top:20px;color:rgba(255,255,255,0.35);font-size:12px;
  font-weight:600;text-decoration:none;transition:color var(--transition);
}
.back-link:hover,.back-link:focus-visible{color:rgba(255,255,255,0.7)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* === APP SHELL === */
.app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.app.visible{display:flex}

/* Header */
.app-header{
  background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border);color:#fff;padding:0 24px;height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.app-header-left{display:flex;align-items:center;gap:12px;min-width:0}
.portal-btn{
  display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--text-muted);
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  text-decoration:none;transition:all var(--transition);white-space:nowrap;
}
.portal-btn:hover{color:#fff;background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.25)}
.header-badge{
  background:rgba(255,255,255,0.12);padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);
}
.app-header h1{font-size:17px;font-weight:900;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Month nav */
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;
  width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.month-nav button:hover{background:rgba(255,255,255,0.2)}
.month-label{font-size:13px;font-weight:800;min-width:130px;text-align:center}

/* Venue tabs */
.venue-bar{
  background:rgba(255,255,255,0.04);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid rgba(255,255,255,0.08);padding:0 24px;
  display:flex;align-items:flex-end;gap:4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.venue-tab{
  padding:12px 24px;border:none;background:none;font-family:inherit;font-size:13px;
  font-weight:700;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;
  margin-bottom:-1px;transition:all var(--transition);white-space:nowrap;
}
.venue-tab:hover{color:var(--text-secondary)}
.venue-tab.active{color:#fff;border-bottom-color:var(--teal)}
.venue-tab.love.active{border-bottom-color:var(--love-pink)}
.venue-tab.hours.active{border-bottom-color:#4caf50}
.venue-tab.manage.active{border-bottom-color:#ff9800}
.manage-djs-wrap{padding:16px;max-width:1200px;margin:0 auto}
.manage-djs-table{width:100%;border-collapse:collapse;margin-top:12px}
.manage-djs-table th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--text-secondary);font-size:12px;text-transform:uppercase}
.manage-djs-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.manage-djs-table tr:hover{background:rgba(255,255,255,0.03)}
.badge-active{background:#4caf50;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px}
.badge-inactive{background:#666;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px}
.badge-locked{background:#f44336;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px}
.manage-btn{padding:4px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text-primary);border-radius:4px;cursor:pointer;font-size:12px;margin:0 2px}
.manage-btn:hover{background:rgba(255,255,255,0.1)}
.manage-btn.danger{border-color:#f44336;color:#f44336}
.manage-btn.danger:hover{background:rgba(244,67,54,0.1)}
.manage-add-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.manage-add-form input,.manage-add-form select{padding:6px 10px;border:1px solid var(--border);background:var(--bg);color:var(--text-primary);border-radius:4px;font-size:13px}
.manage-add-form button{padding:6px 14px;background:var(--teal);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px}
.manage-edit-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000}
.manage-edit-modal{background:#1a1f2e;border:1px solid var(--border);border-radius:12px;padding:24px;min-width:320px;max-width:90vw}
.manage-edit-modal h3{margin:0 0 16px;color:var(--text-primary)}
.manage-edit-modal label{display:block;margin-bottom:12px;color:var(--text-secondary);font-size:13px}
.manage-edit-modal input,.manage-edit-modal select{width:100%;padding:8px;border:1px solid var(--border);background:var(--bg);color:var(--text-primary);border-radius:4px;margin-top:4px;box-sizing:border-box}
.manage-edit-modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.avail-grid{border-collapse:collapse;width:100%;font-size:12px}
.avail-grid th{padding:4px 6px;text-align:center;color:var(--text-secondary);font-size:11px}
.avail-grid td{padding:4px 6px;text-align:center}
.avail-grid input[type="checkbox"]{width:16px;height:16px;cursor:pointer}
.avail-grid td.disabled-slot input[type="checkbox"]{opacity:0.25;cursor:not-allowed}
.avail-section-heading{font-size:13px;font-weight:700;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.avail-section-heading.teal{color:var(--teal)}
.avail-section-heading.pink{color:var(--love-pink)}

/* Main content */
.main-content{flex:1;overflow:auto;padding:20px 24px;-webkit-overflow-scrolling:touch}

/* === ROSTER TABLE === */
.grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);background:#fff;box-shadow:var(--shadow)}
.grid-wrap::-webkit-scrollbar{height:6px}
.grid-wrap::-webkit-scrollbar-track{background:transparent}
.grid-wrap::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:3px}

.roster-table{border-collapse:collapse;min-width:100%;font-size:11px}
.roster-table thead th{
  padding:10px 6px;text-align:center;font-weight:800;font-size:10px;white-space:nowrap;
  position:sticky;top:0;z-index:10;border-bottom:2px solid #dde2f0;letter-spacing:.03em;
}
.th-date{
  background:var(--navy)!important;color:#fff!important;min-width:110px;
  text-align:left!important;padding-left:14px!important;
  position:sticky!important;left:0!important;z-index:20!important;
}
.th-arkbar{background:var(--teal-light);color:var(--navy);min-width:82px}
.th-hip{background:var(--orange);color:#fff;min-width:82px}
.th-love{background:var(--love-light);color:var(--love-dark);min-width:82px}
.th-section-label{padding:6px;font-size:11px;font-weight:800;text-align:center;letter-spacing:.05em}

.roster-table tbody tr:nth-child(even){background:#fafbff}
.roster-table tbody tr:hover{background:#f4f5ff}

.td-date{
  padding:8px 14px;font-weight:700;font-size:11px;color:#1c2340;white-space:nowrap;
  border-right:2px solid #dde2f0;position:sticky;left:0;z-index:5;min-width:110px;background:#fff;
}
.roster-table tbody tr:nth-child(even) .td-date{background:#fafbff}
.roster-table tbody tr:hover .td-date{background:#f4f5ff}
.td-date .dow{color:var(--teal);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;display:block}
.td-date.weekend .dow{color:var(--orange)}

.td-slot{padding:4px;border:1px solid #eef0f8;min-width:82px;vertical-align:middle;position:relative}
.td-slot.hip-slot{background:rgba(241,90,41,0.04);border-color:rgba(241,90,41,0.15)}
.td-slot.love-slot{background:rgba(233,30,140,0.03);border-color:rgba(233,30,140,0.12)}
.td-slot.empty-slot{background:#f9f9f9}
.slot-select{
  width:100%;padding:5px 3px;border:1.5px solid transparent;border-radius:6px;
  font-family:inherit;font-size:10px;font-weight:700;color:#1c2340;background:transparent;
  cursor:pointer;outline:none;transition:all .15s;appearance:none;-webkit-appearance:none;
  text-align:center;min-height:28px;
}
.slot-select:hover{border-color:var(--teal);background:var(--teal-light)}
.slot-select:focus{border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px rgba(43,57,144,0.1)}
.slot-select.assigned{color:#fff!important;font-weight:800!important}
.slot-select.unassigned{color:#9aa0b8}
.slot-select.no-avail{background:#f5f5f5;color:#ccc;cursor:not-allowed;font-size:10px}

/* Locked state */
.roster-locked .slot-select:not(.no-avail){pointer-events:none;opacity:.95}
.roster-locked .slot-select.unassigned{opacity:.4}

/* === STATUS BAR === */
.status-bar{
  background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:20px;
  flex-shrink:0;font-size:11px;font-weight:600;color:var(--text-muted);
}
.status-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-weight:700;font-size:11px}
.status-pill.draft{background:rgba(230,81,0,0.2);color:#ffab40;border:1px solid rgba(230,81,0,0.3)}
.status-pill.published{background:rgba(46,125,50,0.2);color:#69f0ae;border:1px solid rgba(46,125,50,0.3)}
.status-bar-right{margin-left:auto;display:flex;gap:10px}
.btn-sm{
  padding:7px 16px;border-radius:var(--radius-sm);font-family:inherit;font-size:11px;
  font-weight:700;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);color:#fff;backdrop-filter:blur(10px);
}
.btn-sm:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3)}
.btn-publish{background:rgba(43,57,144,0.6);border-color:rgba(93,184,192,0.5)}
.btn-publish:hover{background:rgba(43,57,144,0.85);border-color:var(--teal)}
.btn-suggest{background:rgba(93,184,192,0.15);border-color:rgba(93,184,192,0.4);color:var(--teal)}
.btn-suggest:hover{background:rgba(93,184,192,0.3);border-color:var(--teal);color:#fff}
.btn-clear{background:rgba(241,90,41,0.12);border-color:rgba(241,90,41,0.35);color:#ff8a65}
.btn-clear:hover{background:rgba(241,90,41,0.25);border-color:var(--orange);color:#fff}

/* === LOADING & TOAST === */
.loading{text-align:center;padding:80px 40px;color:var(--text-muted);font-weight:600;font-size:13px}
.spinner{
  width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--teal);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);
  min-width:320px;max-width:480px;text-align:center;
  background:rgba(30,40,80,0.95);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,0.15);color:#fff;padding:20px 28px;
  border-radius:10px;font-size:14px;font-weight:700;box-shadow:0 16px 48px rgba(0,0,0,0.6);
  opacity:0;transition:all .3s ease;z-index:9999;pointer-events:none;
}
.toast.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
.toast.success{background:rgba(27,94,32,0.95);border-color:rgba(105,240,174,0.3)}
.toast.error{background:rgba(183,28,28,0.95);border:1px solid rgba(255,100,100,0.6);box-shadow:0 16px 48px rgba(0,0,0,0.6)}

/* === HOURS PAGE === */
.hours-wrap{display:flex;flex-direction:column;gap:20px}
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.summary-card{
  background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--radius);padding:18px;
}
.card-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.card-value{font-size:26px;font-weight:900;color:#fff}
.card-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);margin-top:2px}

.hours-table-wrap{
  background:rgba(255,255,255,0.06);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
}
.hours-table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.hours-table-header h2{font-size:14px;font-weight:800}
.hours-table{width:100%;border-collapse:collapse}
.hours-table thead th{
  padding:9px 14px;text-align:left;font-size:10px;font-weight:800;color:rgba(255,255,255,0.35);
  text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.03);
}
.hours-table thead th.right,.hours-table tbody td.right{text-align:right}
.hours-table tbody tr{border-bottom:1px solid var(--border-subtle);transition:background .1s}
.hours-table tbody tr:last-child{border-bottom:none}
.hours-table tbody tr:hover{background:var(--surface-hover)}
.hours-table tbody td{padding:11px 14px;font-size:12px;font-weight:600;color:var(--text-secondary)}

.dj-name-cell{display:flex;align-items:center;gap:10px}
.dj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dj-name{font-weight:700;font-size:12px;color:#fff}
.hours-bar-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hours-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;min-width:60px}
.hours-bar-fill{height:100%;border-radius:3px;background:var(--teal)}
.hours-bar-fill.resident{background:#7c83ff}
.hours-bar-fill.zero{background:rgba(255,255,255,0.08)}
.hours-val{font-size:12px;font-weight:800;color:#fff;min-width:30px;text-align:right}
.badge{padding:2px 7px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase}
.badge-low{background:rgba(230,81,0,0.25);color:#ffab40;border:1px solid rgba(230,81,0,0.3)}
.badge-ok{background:rgba(46,125,50,0.25);color:#69f0ae;border:1px solid rgba(46,125,50,0.3)}
.badge-needed{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;background:#fff8e1;color:#f57f17;border:1px solid #ffe082;margin-left:6px}
.hours-min-warning{background:rgba(241,90,41,0.15);border:1px solid rgba(241,90,41,0.45);border-radius:10px;padding:12px 18px;font-size:12px;font-weight:700;color:#ffb74d;display:flex;align-items:center;gap:8px}
.totals-row{background:rgba(255,255,255,0.05)!important}
.totals-row td{font-weight:800!important;color:#fff!important}

/* === FINALIZE === */
.finalize-btn{
  padding:7px 16px;border-radius:8px;font-family:inherit;font-size:11px;font-weight:800;
  cursor:pointer;border:1px solid rgba(76,175,80,0.4);background:rgba(76,175,80,0.15);
  color:#81c784;text-transform:uppercase;letter-spacing:.06em;transition:all .2s ease;
}
.finalize-btn:hover:not(:disabled){background:rgba(76,175,80,0.3);border-color:rgba(76,175,80,0.7);color:#a5d6a7}
.finalize-btn:disabled{opacity:.45;cursor:not-allowed}
.finalized-pill{
  display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;
  background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.35);
  font-size:9px;font-weight:800;color:#81c784;text-transform:uppercase;letter-spacing:.1em;
}

/* === FINALIZE MODAL === */
.fin-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:400;
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

<body>

<!-- Ambient background -->
<div class="bg-fixed" aria-hidden="true">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<!-- Login -->
<section class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon" aria-hidden="true">&#9835;</div>
    <h1>DJ Roster</h1>
    <p class="subtitle">Admin - ARKbar &amp; Love Beach Club</p>
    <div class="pw-field">
      <input type="password" id="pwInput" placeholder="Password"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
      <span class="pw-toggle" id="pwToggle" onclick="togglePwView()" role="button" aria-label="Toggle password visibility" tabindex="0">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </span>
    </div>
    <button class="login-btn" onclick="doLogin()">Enter Admin</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
    <a href="/" class="back-link">&larr; Back to Port</a>
  </div>
</section>

<!-- App shell -->
<div class="app" id="mainApp">
  <header class="app-header">
    <div class="app-header-left">
      <a href="/" class="portal-btn">&larr; Portal</a>
      <div class="header-badge">Admin</div>
      <h1 id="headerTitle">ARKbar / HIP Roster</h1>
    </div>
    <nav class="month-nav" aria-label="Month navigation">
      <button onclick="changeMonth(-1)" aria-label="Previous month">&#9664;</button>
      <div class="month-label" id="monthLabel">-</div>

    </nav>
  </header>

  <nav class="venue-bar" aria-label="Venue tabs">
    <button class="venue-tab active" id="tabArkbar" onclick="switchVenue('arkbar')">ARKbar / HIP</button>
    <button class="venue-tab love" id="tabLove" onclick="switchVenue('love')">Love Beach Club</button>
    <button class="venue-tab hours" id="tabHours" onclick="switchVenue('hours')">DJ Hours</button>
    <button class="venue-tab manage" id="tabManage" onclick="switchVenue('manage')">Manage DJs</button>
  </nav>

  <div class="print-header" id="printHeader"></div>
  <main class="main-content" id="mainContent">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </main>

  <footer class="status-bar" id="statusBarEl">
    <div class="status-pill draft" id="statusPill">&#x25CF; Draft</div>
    <span id="statusText">Unsaved changes will auto-save per cell</span>
    <div class="status-bar-right">
      <button class="btn-sm btn-suggest" onclick="runAutoSuggest()">&#9889; Auto-suggest</button>
      <button class="btn-sm btn-clear" onclick="clearRoster()">Clear Roster</button>
<button class="btn-sm btn-publish" id="btnPublish" onclick="publishRoster()">Publish Roster</button>
      <button class="btn-sm" id="btnPrint" onclick="printRoster()" style="display:none;background:#2e7d32;color:#fff;">Print / PDF</button>
      <button class="btn-sm" onclick="resetMonthData()" style="background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.5);color:#ff5252;margin-left:12px;">&#x26A0; RESET MONTH (DEV ONLY)</button>
    </div>
  </footer>
  <div id="manageContent" style="display:none"></div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- Resident hours slide-out -->
<div class="hours-toggle" id="hoursToggle" onclick="toggleHoursPanel()" role="button" tabindex="0" aria-label="Open resident hours panel">DJ HOURS</div>
<div class="hours-panel-overlay" id="hoursPanelOverlay" onclick="toggleHoursPanel()"></div>
<aside class="hours-panel" id="hoursPanel">
  <div class="hours-panel-header">
    <h3>Resident Hours</h3>
    <button class="hours-panel-close" onclick="toggleHoursPanel()" aria-label="Close panel">&#x2715;</button>
  </div>
  <div class="hours-panel-body" id="hoursPanelBody">
    <div style="color:var(--text-faint);font-size:11px;padding:20px 0;text-align:center">Load a roster to see hours</div>
  </div>
</aside>

<script>
// === STATE ===
let currentVenue = 'arkbar';
let currentYear, currentMonth;
let adminPassword = '';
let availability = {};
let rosterAssignments = {};
let arkbarAssignments = {};
let hipAssignments = {};
let loveAssignments = {};
let djList = [];
let submittedDJs = new Map(); // name → status ('pre-loaded' | 'submitted')
let unavailabilityMap = {};   // DJ name → array of "date|slot" strings
let fixedSchedules = null;   // populated once from /api/fixed-schedules
let isPublished = false;
let toastTimer;

// === CONSTANTS ===
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const ARKBAR_SLOTS = [
  '14:00\u201315:00','15:00\u201316:00','16:00\u201317:00','17:00\u201318:00',
  '18:00\u201319:00','20:00\u201321:00','21:00\u201322:00',
  '22:00\u201323:00','23:00\u201300:00','00:00\u201301:00','01:00\u201302:00'
];
const HIP_SLOTS = ['21:00\u201322:00','22:00\u201323:00','23:00\u201300:00','00:00\u201301:00'];
const LOVE_WEEKDAY_SLOTS = [
  '14:00\u201315:00','15:00\u201316:00','16:00\u201317:00',
  '20:00\u201321:00','21:00\u201322:00','22:00\u201323:00','23:00\u201300:00'
];
const LOVE_SAT_SLOTS = [
  '14:00\u201315:00','15:00\u201316:00','16:00\u201317:00','17:00\u201318:00',
  '18:00\u201319:00','20:00\u201321:00','21:00\u201322:00',
  '22:00\u201323:00','23:00\u201300:00'
];

// Populated from /api/config on load; fallback keeps the app functional if the fetch fails.
let RESIDENTS = ['Alex RedWhite','Raffo DJ','Sound Bogie'];
const MORNING_SLOTS = ['14:00\u201315:00','15:00\u201316:00','16:00\u201317:00','17:00\u201318:00','18:00\u201319:00'];
const RESIDENT_TARGET = 80;
const RESIDENT_MIN = 88;   // monthly minimum — warning shown in Hours tab
const RESIDENTS_80HR = ['Alex RedWhite','Raffo DJ'];
const TARGETS = { 'Alex RedWhite':80, 'Raffo DJ':80, 'Sound Bogie':40 };
const LATE_NIGHT_SLOTS = ['23:00\u201300:00','00:00\u201301:00','01:00\u201302:00'];

const DJ_COLORS = {
  'Alex RedWhite':'#1565c0','Raffo DJ':'#6a1b9a','Sound Bogie':'#00695c',
  'Tony':'#b71c1c','Davoted':'#e65100','D.Davoted':'#bf360c','Pick':'#558b2f',
  'Jessi':'#f57f17','Cocoa':'#4e342e','Mostyx':'#0277bd','Laina':'#ad1457',
  'Buba':'#00838f','Vozka':'#4527a0','Sky':'#2e7d32','Tobi':'#5d4037',
  'Spice':'#c62828','Guest DJ':'#78909c',
  'Donsine':'#00897b','Bollie':'#f4511e',
};

function getDJColor(name) {
  if (DJ_COLORS[name]) return DJ_COLORS[name];
  // Hash-based fallback for any DJ not in DJ_COLORS
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const palette = [
    '#1565c0','#6a1b9a','#00695c','#b71c1c','#e65100',
    '#558b2f','#f57f17','#4e342e','#0277bd','#ad1457',
    '#00838f','#4527a0','#2e7d32','#5d4037','#c62828'
  ];
  return palette[Math.abs(hash) % palette.length];
}

// HIP weekly rotation (4 slots per night, one DJ)
// HIP weekly rotation: dow → DJ (Saturday alternates Pick/Tony by week)
const HIP_ROTATION = { 0:'Tony', 1:'Vozka', 2:'Buba', 3:'Pick', 4:'Tobi', 5:'Pick', 6:['Pick','Tony'] };

// Love Beach DJ availability (weekly patterns)
const LOVE_DJS = {
  'Buba':    { days:[2,3,4,5,6] },
  'Sky':     { days:[3,5] },
  'Donsine': { days:[0,4,5,6] },
  'Mostyx':  { days:[0,1,2,3,4,5,6], excluded:[
    { days:[4], slots:['14:00\u201315:00','15:00\u201316:00','16:00\u201317:00'] },
    { days:[6], slots:['15:00\u201316:00','16:00\u201317:00','17:00\u201318:00'] },
  ]},
};

// === HELPERS ===
const pad2 = n => String(n).padStart(2,'0');
const makeDateStr = (y,m,d) => `${y}-${pad2(m+1)}-${pad2(d)}`;
const normalizeSlot = s => s ? s.replace(/[-\u2013\u2014]/g, '\u2013') : s;
const $ = id => document.getElementById(id);

function getMonthString() { return `${MONTHS[currentMonth]} ${currentYear}`; }
function updateMonthLabel() { $('monthLabel').textContent = getMonthString(); }

// === INIT ===
// === SESSION PERSISTENCE ===
const MGMT_SESSION_KEY = 'mgmtSession';
const MGMT_SESSION_TTL = 12 * 60 * 60 * 1000; // 12 hours

function saveMgmtSession(pw) {
  // Use sessionStorage so password is cleared when browser/tab is fully closed
  sessionStorage.setItem(MGMT_SESSION_KEY, JSON.stringify({ pw, loginTime: Date.now() }));
}

function clearMgmtSession() {
  sessionStorage.removeItem(MGMT_SESSION_KEY);
}

function restoreMgmtSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem(MGMT_SESSION_KEY));
    if (!s || !s.pw || Date.now() - s.loginTime > MGMT_SESSION_TTL) return null;
    return s.pw;
  } catch { return null; }
}

document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  updateMonthLabel();

  // Restore session on page refresh (within same browser session)
  const savedPw = restoreMgmtSession();
  if (savedPw) {
    adminPassword = savedPw;
    $('loginWrap').style.display = 'none';
    $('mainApp').classList.add('visible');
    loadAll();
  }
});

// === PASSWORD TOGGLE ===
function togglePwView() {
  const inp = $('pwInput');
  const icon = $('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// === AUTH ===
async function doLogin() {
  const pw = $('pwInput').value;
  const errEl = $('loginError');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (data.success) {
      adminPassword = pw;
      saveMgmtSession(pw);
      $('loginWrap').style.display = 'none';
      $('mainApp').classList.add('visible');
      loadAll();
    } else {
      errEl.textContent = 'Incorrect password. Try again.';
      errEl.style.display = 'block';
    }
  } catch(e) {
    console.error('Login error:', e);
    errEl.textContent = 'Cannot connect to server. Try refreshing.';
    errEl.style.display = 'block';
  }
}

  currentMonth += dir;

  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }

function switchVenue(venue) {
  if (venue === 'manage' && !adminPassword) {
    showToast('Admin login required', 'error');
    return;
  }
  currentVenue = venue;
  $('tabArkbar').classList.toggle('active', venue === 'arkbar');
  $('tabLove').classList.toggle('active', venue === 'love');
  $('tabHours').classList.toggle('active', venue === 'hours');
  $('tabManage').classList.toggle('active', venue === 'manage');
  $('headerTitle').textContent =
    venue === 'arkbar'  ? 'ARKbar / HIP Roster' :
    venue === 'love'    ? 'Love Beach Club Roster' :
    venue === 'manage'  ? 'Manage DJs' : 'DJ Hours';
  $('statusBarEl').style.display = (venue === 'hours' || venue === 'manage') ? 'none' : '';

  // Toggle hours sidebar visibility
  const toggle = $('hoursToggle');
  if (venue === 'hours' || venue === 'manage') {
    toggle.classList.add('hidden');
  } else {
    toggle.classList.remove('hidden');
  }

  if (venue === 'manage') { loadManageDJs(); return; }
  if (venue === 'hours') loadHours();
  else loadAll();
}

// === DATA LOADING ===
async function loadAll() {
  const manageEl = $('manageContent'); if (manageEl) manageEl.style.display = 'none';
  $('mainContent').style.display = '';
  $('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>Loading roster...</div>';
  if (!fixedSchedules) {
    try {
      const d = await fetch('/api/fixed-schedules').then(r => r.json());
      if (d.success) fixedSchedules = d.schedules;
    } catch(e) { /* non-fatal — suggestRoster will fall back gracefully */ }
  }
  const month = getMonthString();
  try {
    const enc = encodeURIComponent;
    const [availRes, arkbarRes, hipRes, loveRes, djRes, configRes, submissionsRes, unavailRes] = await Promise.all([
      fetch(`/api/availability?month=${enc(month)}`),
      fetch(`/api/roster?venue=arkbar&month=${enc(month)}`),
      fetch(`/api/roster?venue=hip&month=${enc(month)}`),
      fetch(`/api/roster?venue=love&month=${enc(month)}`),
      fetch('/api/djs'),
      fetch('/api/config'),
      fetch(`/api/dj/submissions/${enc(month)}`, { headers: { 'x-admin-password': adminPassword } }),
      fetch(`/api/roster/unavailability/${enc(month)}`, { headers: { 'x-admin-password': adminPassword } }),
    ]);
    const [availData, arkbarData, hipData, loveData, djData, configData, submissionsData, unavailData] = await Promise.all([
      availRes.json(), arkbarRes.json(), hipRes.json(), loveRes.json(), djRes.json(), configRes.json(), submissionsRes.json(), unavailRes.json()
    ]);
    if (configData.success && Array.isArray(configData.residents) && configData.residents.length) {
      RESIDENTS = configData.residents;
    }
    submittedDJs = new Map((submissionsData.submitted || []).map(s => [s.name, s.status]));
    if (unavailData.success && unavailData.unavailability) unavailabilityMap = unavailData.unavailability;

    availability = availData.availability || {};

    function parseRoster(rows) {
      const map = {};
      (rows || []).forEach(row => {
        if (row[0] && row[1] && row[2]) map[`${row[0]}|${row[1]}`] = row[2];
      });
      return map;
    }

    arkbarAssignments = parseRoster(arkbarData.roster);
    hipAssignments = parseRoster(hipData.roster);
    loveAssignments = parseRoster(loveData.roster);

    if (currentVenue === 'arkbar') rosterAssignments = arkbarAssignments;
    else if (currentVenue === 'love') rosterAssignments = loveAssignments;

    djList = djData.djs || [];
    renderGrid();
    updateHoursPanel();
  } catch(e) {
    $('mainContent').innerHTML = `<div class="loading">Error loading data: ${e.message}</div>`;
  }
}

// === GRID RENDERER ===
function renderGrid() {
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const isLove = currentVenue === 'love';

  let venueHeaderRow = '';
  let slotHeaderRow = '<th class="th-date">Date</th>';

  if (!isLove) {
    venueHeaderRow = `<tr>
      <th class="th-date" style="border-bottom:none"></th>
      <th colspan="${ARKBAR_SLOTS.length}" class="th-section-label" style="background:var(--teal);color:#fff">ARKbar Beach Club &middot; 14:00 \u2013 02:00</th>
      <th colspan="${HIP_SLOTS.length}" class="th-section-label" style="background:var(--orange);color:#fff">HIP Restaurant &middot; 21:00 \u2013 01:00</th>
    </tr>`;
    ARKBAR_SLOTS.forEach(s => slotHeaderRow += `<th class="th-arkbar">${s}</th>`);
    HIP_SLOTS.forEach(s => slotHeaderRow += `<th class="th-hip">${s}</th>`);
  } else {
    venueHeaderRow = `<tr>
      <th class="th-date" style="border-bottom:none;background:var(--love-dark)!important"></th>
      <th colspan="${LOVE_SAT_SLOTS.length}" class="th-section-label" style="background:var(--love-pink);color:#fff">Love Beach Club &middot; Weekdays 14:00\u201317:00 &amp; 20:00\u201300:00 | Saturdays 14:00\u201300:00</th>
    </tr>`;
    LOVE_SAT_SLOTS.forEach(s => slotHeaderRow += `<th class="th-love">${s}</th>`);
  }

  // Build rows using DocumentFragment approach for perf
  const rowParts = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const dow = date.getDay();
    const isSat = dow === 6;
    const isWeekend = isSat || dow === 0;
    const dateStr = makeDateStr(currentYear, currentMonth, d);

    let cells = '';
    if (!isLove) {
      ARKBAR_SLOTS.forEach(slot => { cells += buildCell(dateStr, slot, 'arkbar'); });
      HIP_SLOTS.forEach(slot => { cells += buildCell(dateStr, slot, 'hip'); });
    } else {
      LOVE_SAT_SLOTS.forEach(slot => {
        const isActive = isSat || LOVE_WEEKDAY_SLOTS.includes(slot);
        cells += isActive ? buildCell(dateStr, slot, 'love') : '<td class="td-slot empty-slot"></td>';
      });
    }

    rowParts.push(`<tr>
      <td class="td-date${isWeekend ? ' weekend' : ''}">
        <span class="dow">${DAYS[dow]}</span>${d} ${MONTHS[currentMonth].slice(0,3)}
      </td>${cells}
    </tr>`);
  }

  $('mainContent').innerHTML = `<div class="grid-wrap">
    <table class="roster-table">
      <thead>${venueHeaderRow}<tr>${slotHeaderRow}</tr></thead>
      <tbody>${rowParts.join('')}</tbody>
    </table></div>
  </div>`;
}

// === CELL BUILDER ===
function buildCell(dateStr, slot, type) {
  const assignMap = type === 'hip' ? hipAssignments : rosterAssignments;
  const slotKey = normalizeSlot(slot);
  const key = `${dateStr}|${slotKey}`;
  const assigned = assignMap[key] || '';
  const avail = (availability[dateStr] && availability[dateStr][slotKey]) || [];

  // All DJs appear in dropdown — no submission gating for manual assignment.
  const options = djList.map(d => d.name).filter(dj => dj !== 'Guest DJ').sort((a, b) => a.localeCompare(b));
  options.push('Guest DJ');

  const isHip = type === 'hip';
  const isLove = type === 'love';
  const tdClass = `td-slot${isHip ? ' hip-slot' : isLove ? ' love-slot' : ''}`;

  if (options.length === 0 && !assigned) {
    return `<td class="${tdClass} empty-slot"><select class="slot-select no-avail" disabled><option>\u2014</option></select></td>`;
  }

  const djColor = assigned ? (getDJColor(assigned) || '#555') : '';
  const selClass = `slot-select ${assigned ? 'assigned' : 'unassigned'}`;
  const styleAttr = assigned ? `style="background:${djColor};border-color:${djColor}"` : '';
  const slotEsc = slot.replace(/"/g, '&quot;');

  // Build flat DJ list with status suffixes
  const djEntries = [];
  options.forEach(dj => {
    const isSelected = dj === assigned;
    const isSubmitted = submittedDJs.get(dj) === 'submitted';
    const isUnavailable = unavailabilityMap[dj] && unavailabilityMap[dj].includes(key);
    // Cross-venue booking: DJ assigned to another venue for same date+slot
    const crossVenueBooked = (type !== 'arkbar' && arkbarAssignments[key] === dj) ||
                             (type !== 'hip' && hipAssignments[key] === dj) ||
                             (type !== 'love' && loveAssignments[key] === dj);

    let suffix = '';
    if (dj !== 'Guest DJ') {
      if (crossVenueBooked && !isSelected) suffix = ' (booked)';
      else if (!isSubmitted) suffix = ' (?)';
      else if (isUnavailable) suffix = ' (unavail)';
    }

    let color = '';
    if (dj !== 'Guest DJ') {
      if (crossVenueBooked && !isSelected) color = '#F5A623';
      else if (!isSubmitted) color = '#F87171';
      else if (isUnavailable) color = '#F5A623';
      else color = '#4ADE80';
    }

    djEntries.push({ dj, isSelected, suffix, color });
  });

  // Sort alphabetically, Guest DJ at end
  djEntries.sort((a, b) => {
    if (a.dj === 'Guest DJ') return 1;
    if (b.dj === 'Guest DJ') return -1;
    return a.dj.localeCompare(b.dj);
  });

  let opts = '<option value="">\u2014 assign \u2014</option>';
  djEntries.forEach(({ dj, isSelected, suffix, color }) => {
    const label = isSelected ? dj : `${dj}${suffix}`;
    const colorStyle = color ? ` style="color:${color}"` : '';
    opts += `<option value="${dj}"${isSelected ? ' selected' : ''}${colorStyle}>${label}</option>`;
  });

  return `<td class="${tdClass}"><select class="${selClass}" ${styleAttr} data-date="${dateStr}" data-slot="${slotEsc}" data-type="${type}" onchange="assignDJ(this)">${opts}</select></td>`;
}

// === ASSIGN DJ ===
async function assignDJ(sel) {
  if (isPublished) return;

  const date = sel.dataset.date;
  const slot = sel.dataset.slot;
  const type = sel.dataset.type;
  const dj = sel.value;
  const key = `${date}|${slot}`;
  const venueParam = type === 'hip' ? 'hip' : type === 'love' ? 'love' : 'arkbar';

  if (dj) {
    const dayAssignments = Object.entries(rosterAssignments).filter(([k,v]) => k.startsWith(date) && v === dj);
    if (dayAssignments.length >= 7) {
      showToast(`${dj} already has 7 slots on this day`, 'error'); sel.value = ''; return;
    }

    const combinedTimeline = [
      '14:00\u201315:00','15:00\u201316:00','16:00\u201317:00','17:00\u201318:00',
      '18:00\u201319:00','20:00\u201321:00','21:00\u201322:00',
      '22:00\u201323:00','23:00\u201300:00','00:00\u201301:00','01:00\u201302:00'
    ];
    const isSat = new Date(date).getDay() === 6;
    const allSlots = type === 'love' ? (isSat ? [...LOVE_SAT_SLOTS] : [...LOVE_WEEKDAY_SLOTS]) : combinedTimeline;
    const slotIdx = allSlots.indexOf(slot);

    if (slotIdx >= 0) {
      let before = 0, after = 0;
      for (let i = slotIdx - 1; i >= 0; i--) {
        if (rosterAssignments[`${date}|${allSlots[i]}`] === dj) before++; else break;
      }
      for (let i = slotIdx + 1; i < allSlots.length; i++) {
        if (rosterAssignments[`${date}|${allSlots[i]}`] === dj) after++; else break;
      }
      if (before + after >= 7) {
        showToast(`${dj} can't play more than 7 slots in a row`, 'error'); sel.value = ''; return;
      }
    }

    if (type === 'hip' && rosterAssignments[`${date}|${slot}`] === dj) {
      showToast(`${dj} is already on ARKbar at ${slot}`, 'error'); sel.value = ''; return;
    }

    const otherMap = type === 'love' ? arkbarAssignments : loveAssignments;
    if (otherMap[`${date}|${slot}`] === dj) {
      const otherVenue = type === 'love' ? 'ARKbar' : 'Love Beach';
      showToast(`${dj} is already on ${otherVenue} at ${slot}`, 'error'); sel.value = ''; return;
    }
  }

  // Update UI immediately
  if (dj) {
    const color = getDJColor(dj) || '#555';
    const djStatus = submittedDJs.get(dj);
    const isConfirmed = djStatus === 'submitted';
    if (isConfirmed) {
      sel.className = 'slot-select assigned';
      sel.style.background = color;
      sel.style.borderColor = color;
      sel.style.color = 'white';
      sel.title = '';
    } else {
      sel.className = 'slot-select assigned unconfirmed';
      sel.style.background = '#f59e0b';
      sel.style.borderColor = '#d97706';
      sel.style.color = 'white';
      sel.title = 'Availability not yet confirmed';
    }
    rosterAssignments[key] = dj;
    if (venueParam === 'hip') hipAssignments[key] = dj;
    else if (venueParam === 'arkbar') arkbarAssignments[key] = dj;
    else loveAssignments[key] = dj;
  } else {
    sel.className = 'slot-select unassigned';
    sel.style.background = '';
    sel.style.borderColor = '';
    sel.style.color = '';
    delete rosterAssignments[key];
    if (venueParam === 'hip') delete hipAssignments[key];
    else if (venueParam === 'arkbar') delete arkbarAssignments[key];
    else delete loveAssignments[key];
  }

  try {
    const res = await fetch('/api/roster/assign', {
      method:'POST', headers:{'Content-Type':'application/json','x-admin-password':adminPassword},
      body: JSON.stringify({ venue:venueParam, date, slot, dj, month:getMonthString() })
    });
    const data = await res.json();
    if (data.success) {
      showToast(dj ? `${dj} saved` : 'Cleared', 'success');
      updateHoursPanel();
    } else {
      showToast('Save failed', 'error');
    }
  } catch(e) {
    showToast('Connection error', 'error');
  }
}

// === CLEAR ROSTER ===
async function resetMonthData() {
  const month = getMonthString();
  if (!confirm(`⚠️ RESET MONTH: ${month}\n\nThis will DELETE all availability, submissions, and roster assignments for this month.\n\nThis CANNOT be undone. Are you sure?`)) return;
  if (!confirm(`FINAL WARNING: All data for ${month} will be permanently deleted. Type OK to confirm.`)) return;
  showToast('Resetting month data...', '');
  try {
    const res = await fetch('/api/admin/reset-month', {
      method: 'POST', headers: {'Content-Type':'application/json','x-admin-password': adminPassword},
      body: JSON.stringify({ month })
    });
    const data = await res.json();
    if (data.success) {
      showToast(`Month ${month} reset`, 'success');
      loadAll();
    } else {
      showToast('Reset failed: ' + (data.error || 'Unknown'), 'error');
    }
  } catch(e) {
    showToast('Reset failed: ' + e.message, 'error');
  }
}

async function clearRoster() {
  if (isPublished) { showToast('Unlock roster before clearing', 'error'); return; }
  if (currentVenue === 'hours') return;

  const venueName = currentVenue === 'love' ? 'Love Beach' : 'ARKbar/HIP';
  if (!confirm(`Clear ALL assignments for ${getMonthString()} \u2014 ${venueName}?\n\nThis cannot be undone.`)) return;

  showToast('Clearing roster...', '');
  const venueParam = currentVenue === 'love' ? 'love' : 'arkbar';
  const month = getMonthString();

  try {
    const venuesToClear = venueParam === 'arkbar' ? ['arkbar','hip'] : [venueParam];
    await Promise.all(venuesToClear.map(v =>
      fetch('/api/roster/clear', {
        method:'POST', headers:{'Content-Type':'application/json','x-admin-password':adminPassword},
        body: JSON.stringify({ venue:v, month })
      })
    ));
    rosterAssignments = {};
    if (venueParam === 'arkbar') { arkbarAssignments = {}; hipAssignments = {}; }
    else loveAssignments = {};
    renderGrid();
    showToast('Roster cleared', 'success');
  } catch(e) {
    rosterAssignments = {};
    if (venueParam === 'arkbar') { arkbarAssignments = {}; hipAssignments = {}; }
    else loveAssignments = {};
    renderGrid();
    showToast('Cleared locally \u2014 check connection', 'error');
  }
}

      5: { '14:00\u201315:00':'Davoted','15:00\u201316:00':'Davoted','16:00\u201317:00':'Davoted','17:00\u201318:00':'Jessi','18:00\u201319:00':'Jessi','20:00\u201321:00':'Alex RedWhite','21:00\u201322:00':'Alex RedWhite','22:00\u201323:00':'Alex RedWhite','23:00\u201300:00':'Sound Bogie','00:00\u201301:00':'Sound Bogie','01:00\u201302:00':'Sound Bogie' },
      6: { '14:00\u201315:00':'Pick','15:00\u201316:00':'Pick','16:00\u201317:00':'Pick','17:00\u201318:00':'Alex RedWhite','18:00\u201319:00':'Alex RedWhite','20:00\u201321:00':'Sound Bogie','21:00\u201322:00':'Raffo DJ','22:00\u201323:00':'Raffo DJ' },
    },
    hip: {
      0: 'Tony',
      1: 'Vozka',
      2: 'Buba',
      3: 'Pick',
      4: 'Tobi',
      5: 'Vozka',
      6: ['Pick','Tony'],
    },
  };

  // ── STEP 3: Shared state ──
  const working = {};
  const loveWorking = {};
  hipAssignments = {};
  const placedTonight = new Map();
  const djHours = {};
  const djDaySlots = {};
  let assignedCount = 0, unavailSkips = 0, partialSkips = 0, notSubmittedSkips = 0;

  console.group('Auto-Suggest: ' + month);

  // ── STEP 4: canAssign + recordPlacement ──
  function canAssign(dj, dateStr, slot, targetMap) {
    if (dj !== 'Guest DJ' && submittedDJs.get(dj) !== 'submitted') return false;
    if (unavailabilityMap[dj]?.includes(`${dateStr}|${slot}`)) return false;
    if (targetMap[`${dateStr}|${slot}`]) return false;
    return true;
  }

  function recordPlacement(dj, dateStr, slot, targetMap, saveArray, type) {
    targetMap[`${dateStr}|${slot}`] = dj;
    if (!placedTonight.has(dateStr)) placedTonight.set(dateStr, new Set());
    placedTonight.get(dateStr).add(dj);
    (djDaySlots[`${dj}|${dateStr}`] ??= []).push(slot);
    djHours[dj] = (djHours[dj] || 0) + 1;
    saveArray.push({ dateStr, slot, dj, type });
  }

  // ── PASS 1: Love Beach ──
  const loveToSave = [];
  let satLoveToggle = 0;

  console.group('Pass: Love Beach');
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dateStr = makeDateStr(currentYear, currentMonth, d);
    let template, slots;

    if (dow === 6) {
      template = satLoveToggle % 2 === 0 ? FIXED_TEMPLATE.love.satA : FIXED_TEMPLATE.love.satB;
      satLoveToggle++;
      slots = ALL_LOVE_SLOTS_SATURDAY;
    } else {
      template = FIXED_TEMPLATE.love.weekday[dow];
      slots = ALL_LOVE_SLOTS_WEEKDAY;
    }
    if (!template) continue;

    // Group template slots by DJ (all-or-nothing block enforcement)
    const djBlocks = {};
    for (const slot of slots) {
      const dj = template[slot];
      if (!dj) continue;
      (djBlocks[dj] ??= []).push(slot);
    }
    for (const [dj, blockSlots] of Object.entries(djBlocks)) {
      if (dj !== 'Guest DJ' && submittedDJs.get(dj) !== 'submitted') {
        console.log('SKIP (not submitted)', dj, dateStr, 'love');
        notSubmittedSkips++;
        continue;
      }
      if (blockSlots.every(slot => canAssign(dj, dateStr, slot, loveWorking))) {
        for (const slot of blockSlots) {
          recordPlacement(dj, dateStr, slot, loveWorking, loveToSave, 'love');
        }
        console.log('ASSIGN', dj, dateStr, blockSlots.join(', '), 'love');
        assignedCount += blockSlots.length;
      } else {
        const assignableSlots = blockSlots.filter(slot => canAssign(dj, dateStr, slot, loveWorking));
        if (assignableSlots.length === 0) {
          const failedSlots = blockSlots.filter(slot => !canAssign(dj, dateStr, slot, loveWorking));
          console.log('SKIP (unavailable)', dj, dateStr, 'failed slots:', failedSlots, 'love');
          unavailSkips++;
        } else {
          console.log('SKIP (partial block)', dj, dateStr, 'has:', assignableSlots, 'needs:', blockSlots, 'love');
          partialSkips++;
        }
      }
    }
  }
  console.groupEnd();

  // ── PASS 2: ARKbar ──
  const toSave = [];

  console.group('Pass: ARKbar');
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dateStr = makeDateStr(currentYear, currentMonth, d);
    const template = FIXED_TEMPLATE.arkbar[dow];
    if (!template) continue;

    // Group template slots by DJ (all-or-nothing block enforcement)
    const djBlocks = {};
    for (const slot of ALL_ARKBAR_SLOTS) {
      const dj = template[slot];
      if (!dj) continue;
      (djBlocks[dj] ??= []).push(slot);
    }
    for (const [dj, blockSlots] of Object.entries(djBlocks)) {
      if (dj !== 'Guest DJ' && submittedDJs.get(dj) !== 'submitted') {
        console.log('SKIP (not submitted)', dj, dateStr, 'arkbar');
        notSubmittedSkips++;
        continue;
      }
      if (blockSlots.every(slot => canAssign(dj, dateStr, slot, working))) {
        for (const slot of blockSlots) {
          recordPlacement(dj, dateStr, slot, working, toSave, 'arkbar');
        }
        console.log('ASSIGN', dj, dateStr, blockSlots.join(', '), 'arkbar');
        assignedCount += blockSlots.length;
      } else {
        const assignableSlots = blockSlots.filter(slot => canAssign(dj, dateStr, slot, working));
        if (assignableSlots.length === 0) {
          const failedSlots = blockSlots.filter(slot => !canAssign(dj, dateStr, slot, working));
          console.log('SKIP (unavailable)', dj, dateStr, 'failed slots:', failedSlots, 'arkbar');
          unavailSkips++;
        } else {
          console.log('SKIP (partial block)', dj, dateStr, 'has:', assignableSlots, 'needs:', blockSlots, 'arkbar');
          partialSkips++;
        }
      }
    }
  }
  console.groupEnd();

  // ── PASS 3: HIP ──
  const hipToSave = [];
  let satHipToggle = 0;

  console.group('Pass: HIP');
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const dateStr = makeDateStr(currentYear, currentMonth, d);
    let hipDJ = FIXED_TEMPLATE.hip[dow];
    if (!hipDJ) continue;

    if (Array.isArray(hipDJ)) {
      hipDJ = hipDJ[satHipToggle % hipDJ.length];
      satHipToggle++;
    }

    if (!LOCAL_HIP_SLOTS.every(slot => canAssign(hipDJ, dateStr, slot, hipAssignments))) {
      const failedSlots = LOCAL_HIP_SLOTS.filter(slot => !canAssign(hipDJ, dateStr, slot, hipAssignments));
      console.log('SKIP (unavailable)', hipDJ, dateStr, 'failed slots:', failedSlots, 'hip');
      unavailSkips++;
      continue;
    }
    const alreadyPlaced = djDaySlots[`${hipDJ}|${dateStr}`] || [];
    if (LOCAL_HIP_SLOTS.some(s => alreadyPlaced.includes(s))) {
      console.log('SKIP (slot conflict)', hipDJ, dateStr, 'hip overlaps:', alreadyPlaced.filter(s => LOCAL_HIP_SLOTS.includes(s)));
      continue;
    }

    for (const slot of LOCAL_HIP_SLOTS) {
      recordPlacement(hipDJ, dateStr, slot, hipAssignments, hipToSave, 'hip');
    }
    console.log('ASSIGN', hipDJ, dateStr, LOCAL_HIP_SLOTS.join(', '), 'hip');
    assignedCount += LOCAL_HIP_SLOTS.length;
  }
  console.groupEnd();

  console.log(`Summary: assigned ${assignedCount} slots, ${unavailSkips} unavailable skips, ${partialSkips} partial blocks rejected, ${notSubmittedSkips} not-submitted skips`);
  console.groupEnd();

  // ── RENDER & SAVE ──
  const totalSlots = toSave.length + hipToSave.length + loveToSave.length;
  if (totalSlots === 0) { showToast('No slots could be auto-assigned', 'error'); return; }

  arkbarAssignments = { ...working };
  loveAssignments = { ...loveWorking };
  rosterAssignments = currentVenue === 'love' ? { ...loveWorking } : { ...working };
  renderGrid();
  updateHoursPanel();

  [...toSave, ...hipToSave, ...loveToSave].forEach(({dateStr, slot, type: slotType}) => {
    const sel = [...document.querySelectorAll(`select[data-date="${dateStr}"][data-type="${slotType}"]`)]
      .find(s => s.dataset.slot === slot);
    if (sel) assignDJ(sel);
  });

  const summary = RESIDENTS.map(r => `${r}: ${djHours[r] || 0}h`).join(' \u00B7 ');
  showToast(`Saving ${totalSlots} slots...`, 'success');

  try {
    const saves = [];
    if (toSave.length > 0) saves.push(fetch('/api/roster/batch', {
      method:'POST', headers:{'Content-Type':'application/json','x-admin-password':adminPassword},
      body: JSON.stringify({ venue:'arkbar', month, assignments:toSave.map(({dateStr,slot,dj}) => ({date:dateStr,slot,dj})) })
    }));
    if (hipToSave.length > 0) saves.push(fetch('/api/roster/batch', {
      method:'POST', headers:{'Content-Type':'application/json','x-admin-password':adminPassword},
      body: JSON.stringify({ venue:'hip', month, assignments:hipToSave.map(({dateStr,slot,dj}) => ({date:dateStr,slot,dj})) })
    }));
    if (loveToSave.length > 0) saves.push(fetch('/api/roster/batch', {
      method:'POST', headers:{'Content-Type':'application/json','x-admin-password':adminPassword},
      body: JSON.stringify({ venue:'love', month, assignments:loveToSave.map(({dateStr,slot,dj}) => ({date:dateStr,slot,dj})) })
    }));
    const results = await Promise.all(saves);
    const allOk = (await Promise.all(results.map(r => r.json()))).every(d => d.success);
    showToast(allOk
      ? `Done: Love ${loveToSave.length} + ARKbar ${toSave.length} + HIP ${hipToSave.length} \u00B7 ${unavailSkips} unavail skips\u00B7 ${partialSkips} partial blocks rejected \u00B7 ${summary}`
      : 'Some saves failed \u2014 check sheet', allOk ? 'success' : 'error');
  } catch(e) {
    showToast('UI updated \u2014 check connection', 'error');
  }
}

// === HOURS TAB ===
async function loadHours() {
  const manageEl = $('manageContent'); if (manageEl) manageEl.style.display = 'none';
  $('mainContent').style.display = '';
  $('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>Loading hours...</div>';
  const month = getMonthString();
  try {
    const enc = encodeURIComponent;
    const [arkRes, loveRes, djRes, signoffRes] = await Promise.all([
      fetch(`/api/roster?venue=arkbar&month=${enc(month)}`),
      fetch(`/api/roster?venue=love&month=${enc(month)}`),
      fetch('/api/djs'),
      fetch(`/api/signoffs/${enc(month)}`, { headers: { 'x-admin-password': adminPassword } }),
    ]);
    const [arkData, loveData, djData, signoffData] = await Promise.all([arkRes.json(), loveRes.json(), djRes.json(), signoffRes.json()]);
    const scheduledHours = {};
    (arkData.roster || []).forEach(r => { if (r[2] && r[2] !== 'Guest DJ') scheduledHours[r[2]] = (scheduledHours[r[2]] || 0) + 1; });
    (loveData.roster || []).forEach(r => { if (r[2] && r[2] !== 'Guest DJ') scheduledHours[r[2]] = (scheduledHours[r[2]] || 0) + 1; });
    const signedOffHours = signoffData.signedOff || {};

    renderHours(djData.djs || [], scheduledHours, signedOffHours);
  } catch(e) {
    $('mainContent').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function renderHours(djs, scheduledHours, signedOffHours) {
  checkFinalized();
  const normalize = name => name ? name.trim().toLowerCase() : '';

  const schedNorm = {}, signNorm = {};
  Object.entries(scheduledHours).forEach(([k,v]) => { schedNorm[normalize(k)] = v; });
  Object.entries(signedOffHours).forEach(([k,v]) => { signNorm[normalize(k)] = v; });

  const scheduled = {}, signedOff = {};
  djs.forEach(d => {
    if (d.name === 'Guest DJ') { scheduled[d.name] = 0; signedOff[d.name] = 0; return; }
    scheduled[d.name] = schedNorm[normalize(d.name)] || 0;
    signedOff[d.name] = signNorm[normalize(d.name)] || 0;
  });

  const totalScheduled = Object.values(scheduled).reduce((a,b) => a + b, 0);
  const totalSignedOff = Object.values(signedOff).reduce((a,b) => a + b, 0);
  const totalCost = djs.reduce((sum,d) => sum + (signedOff[d.name] || 0) * d.rate, 0);
  const maxHours = Math.max(...Object.values(scheduled), RESIDENT_TARGET);

  const sorted = [...djs].sort((a,b) => {
    const aR = RESIDENTS.includes(a.name) ? 1 : 0;
    const bR = RESIDENTS.includes(b.name) ? 1 : 0;
    if (aR !== bR) return bR - aR;
    return (scheduled[b.name] || 0) - (scheduled[a.name] || 0);
  });

  const rows = sorted.map(dj => {
    const sched = scheduled[dj.name] || 0;
    const signed = signedOff[dj.name] || 0;
    const isResident = RESIDENTS.includes(dj.name);
    const has80Target = RESIDENTS_80HR.includes(dj.name);
    const pct = maxHours > 0 ? Math.min(sched / maxHours * 100, 100) : 0;
    const cost = dj.name === 'Guest DJ' ? 0 : signed * dj.rate;
    const barClass = `hours-bar-fill${isResident ? ' resident' : sched === 0 ? ' zero' : ''}`;
    const isSoundBogie = dj.name === 'Sound Bogie';
    const djTarget = isSoundBogie ? 35 : has80Target ? RESIDENT_MIN : RESIDENT_TARGET;
    const djTargetLabel = isSoundBogie ? '30\u201340' : has80Target ? RESIDENT_MIN : RESIDENT_TARGET;
    let badge = '';
    if (has80Target || isSoundBogie) {
      badge = sched >= djTarget
        ? `<span class="badge badge-ok">${sched}/${djTargetLabel}h \u2713</span>`
        : `<span class="badge badge-low">${sched}/${djTargetLabel}h</span><span class="badge-needed">${djTarget - sched}h needed</span>`;
    }
    return `<tr>
      <td><div class="dj-name-cell" style="cursor:pointer" onclick="showDJDetail('${dj.name.replace(/'/g,"\\'")}')">
        <div class="dj-dot" style="background:${getDJColor(dj.name)||'#aaa'}"></div>
        <div>
          <div class="dj-name" style="text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px">${dj.name}</div>
          ${isResident ? '<div style="font-size:9px;color:var(--teal);font-weight:800;text-transform:uppercase;letter-spacing:.06em">Resident</div>' : ''}
        </div>
      </div></td>
      <td class="right">${sched > 0 ? sched + 'h' : '\u2014'}</td>
      <td class="right">${signed > 0 ? signed + 'h' : '\u2014'}</td>
      <td><div class="hours-bar-wrap">
        <div class="hours-bar-bg"><div class="${barClass}" style="width:${pct}%"></div></div>
        <div class="hours-val">${sched}h</div>${badge}
      </div></td>
      <td class="right" style="color:var(--text-secondary)">\u0E3F${dj.rate.toLocaleString()}/h</td>
      <td class="right" style="font-weight:800;color:var(--navy)">${cost > 0 ? '\u0E3F' + cost.toLocaleString() : '\u2014'}</td>
    </tr>`;
  }).join('');

  const belowMin = RESIDENTS_80HR.filter(r => (scheduled[r] || 0) < RESIDENT_MIN);
  const minWarning = belowMin.length
    ? `<div class="hours-min-warning">&#9888; Minimum ${RESIDENT_MIN}h not met: ${belowMin.map(r => `${r} (${scheduled[r]||0}h)`).join(', ')}</div>`
    : '';

  $('mainContent').innerHTML = `<div class="hours-wrap">
    ${minWarning}
    <div class="summary-row">
      <div class="summary-card"><div class="card-label">Scheduled</div><div class="card-value">${totalScheduled}h</div><div class="card-sub">${getMonthString()}</div></div>
      <div class="summary-card"><div class="card-label">Signed Off</div><div class="card-value">${totalSignedOff}h</div><div class="card-sub">${getMonthString()}</div></div>
      <div class="summary-card"><div class="card-label">Total Cost</div><div class="card-value" style="font-size:20px">\u0E3F${totalCost.toLocaleString()}</div><div class="card-sub">Signed-off hours only</div></div>
    </div>
    <div class="hours-table-wrap">
      <div class="hours-table-header">
        <h2>Hours by DJ \u2014 ${getMonthString()}</h2>
        <div style="display:flex;align-items:center;gap:8px" id="finalizeArea">
          <button class="finalize-btn" id="finalizeBtn" onclick="previewMonth()">Finalise Month</button>
        </div>
      </div>
      <table class="hours-table">
        <thead><tr><th>DJ</th><th class="right">Scheduled</th><th class="right">Signed Off</th><th>Hours Bar</th><th class="right">Rate</th><th class="right">Cost (signed)</th></tr></thead>
        <tbody>${rows}
          <tr class="totals-row">
            <td>Total</td><td class="right">${totalScheduled}h</td><td class="right">${totalSignedOff}h</td>
            <td></td>
            <td></td><td class="right" style="font-size:14px;color:var(--navy)">\u0E3F${totalCost.toLocaleString()}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

// === DJ DETAIL MODAL ===
async function showDJDetail(djName) {
  const month = getMonthString();
  const enc = encodeURIComponent;
  const [arkRes, hipRes, loveRes, signoffRes] = await Promise.all([
    fetch(`/api/roster?venue=arkbar&month=${enc(month)}`).then(r=>r.json()),
    fetch(`/api/roster?venue=hip&month=${enc(month)}`).then(r=>r.json()),
    fetch(`/api/roster?venue=love&month=${enc(month)}`).then(r=>r.json()),
    fetch(`/api/dj/signoffs/${enc(djName)}/${enc(month)}`).then(r=>r.json()).catch(()=>({signoffs:[]})),
  ]);

  const signoffSet = new Set((signoffRes.signoffs || []).map(s => `${s.date}|${s.slot}|${s.venue}`));
  const VENUE_LABEL = { arkbar:'ARKbar', hip:'HIP', love:'Love Beach' };

  const norm = n => n ? n.trim().toLowerCase() : '';
  const djNorm = norm(djName);
  const dayData = {};
  function addSlots(rows, venue) {
    (rows || []).forEach(r => {
      if (norm(r[2]) !== djNorm) return;
      if (!dayData[r[0]]) dayData[r[0]] = { arkbar:[], hip:[], love:[] };
      dayData[r[0]][venue].push(r[1]);
    });
  }
  addSlots(arkRes.roster, 'arkbar');
  addSlots(hipRes.roster, 'hip');
  addSlots(loveRes.roster, 'love');

  const dates = Object.keys(dayData).sort();
  let arkTotal = 0, hipTotal = 0, loveTotal = 0;
  const djInfo = (djList || []).find(d => d.name === djName);
  const rate = djInfo ? djInfo.rate : 0;
  const color = getDJColor(djName) || '#aaa';

  const formatSlots = slots => slots.length > 0
    ? `<div class="dj-slot-cell">${slots.map(s => `<span class="dj-slot-tag">${s}</span>`).join('')}</div>`
    : '<span style="color:var(--text-faint)">\u2014</span>';

  let tableRows = '';
  let grandSignedCount = 0;
  dates.forEach(date => {
    const d = dayData[date];
    const dow = new Date(date).getDay();
    const dayLabel = `${DAYS[dow]} ${date.split('-')[2]} ${MONTHS[currentMonth].slice(0,3)}`;
    const as = d.arkbar.sort(), hs = d.hip.sort(), ls = d.love.sort();
    arkTotal += as.length; hipTotal += hs.length; loveTotal += ls.length;
    const dayTotal = as.length + hs.length + ls.length;
    const signedCount = [['arkbar',as],['hip',hs],['love',ls]].reduce(
      (sum, [vk, slots]) => sum + slots.filter(s => signoffSet.has(`${date}|${s}|${VENUE_LABEL[vk]}`)).length, 0);
    grandSignedCount += signedCount;
    let signoffCell = '\u2014';
    if (signedCount > 0) {
      const all = signedCount === dayTotal;
      const col = all ? '#69f0ae' : '#ffb74d';
      const bg  = all ? 'rgba(105,240,174,0.12)' : 'rgba(255,183,77,0.12)';
      const brd = all ? 'rgba(105,240,174,0.3)'  : 'rgba(255,183,77,0.3)';
      signoffCell = `<span style="background:${bg};border:1px solid ${brd};color:${col};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:800;white-space:nowrap">${signedCount}/${dayTotal}h signed</span>`;
    }
    tableRows += `<tr style="border-bottom:1px solid var(--border-subtle)">
      <td style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--text-muted);white-space:nowrap">${dayLabel}</td>
      <td style="padding:8px 6px;font-size:10px">${formatSlots(as)}</td>
      <td style="padding:8px 6px;font-size:10px">${formatSlots(hs)}</td>
      <td style="padding:8px 6px;font-size:10px">${formatSlots(ls)}</td>
      <td style="padding:8px 12px;text-align:right;color:var(--text-faint)">${signoffCell}</td>
      <td style="padding:8px 12px;font-size:12px;font-weight:800;color:#fff;text-align:right">${dayTotal}h</td>
    </tr>`;
  });

  const grandTotal = arkTotal + hipTotal + loveTotal;
  const totalCost = djName === 'Guest DJ' ? 0 : grandSignedCount * rate;

  const modal = document.createElement('div');

async function checkFinalized() {
  const btn = $('finalizeBtn');
  const area = $('finalizeArea');
  if (!btn || !area) return;
  try {
    const month = getMonthString();
    const data = await fetch(`/api/finalized?month=${encodeURIComponent(month)}`).then(r => r.json());
    if (data.isFinalized) {
      area.innerHTML = `<span class="finalized-pill">&#128274; Finalised</span>`;
    } else {
      btn.disabled = false;
    }
  } catch(e) { /* silently ignore */ }
}

async function previewMonth() {
  const month = getMonthString();
  const enc = encodeURIComponent;
  const norm = n => n ? n.trim().toLowerCase() : '';
  try {
    const [arkRes, hipRes, loveRes, djRes, soRes] = await Promise.all([
      fetch(`/api/roster?venue=arkbar&month=${enc(month)}`).then(r => r.json()),
      fetch(`/api/roster?venue=hip&month=${enc(month)}`).then(r => r.json()),
      fetch(`/api/roster?venue=love&month=${enc(month)}`).then(r => r.json()),
      fetch('/api/djs').then(r => r.json()),
      fetch(`/api/signoffs/${enc(month)}`, { headers: { 'x-admin-password': adminPassword } }).then(r => r.json()).catch(() => ({ signedOff: {} })),
    ]);
    const signedOffMap = soRes.signedOff || {};
    const djs = djRes.djs || [];
    const arkNorm = {}, hipNorm = {}, loveNorm = {};
    (arkRes.roster || []).forEach(r => { if (r[2]) { const k = norm(r[2]); arkNorm[k] = (arkNorm[k]||0)+1; } });
    (hipRes.roster || []).forEach(r => { if (r[2]) { const k = norm(r[2]); hipNorm[k] = (hipNorm[k]||0)+1; } });
    (loveRes.roster || []).forEach(r => {
      if (!r[2]) return;
      const djName = r[2];
      if (djName !== 'Guest DJ') {
        const slotAvail = (availability[r[0]] && availability[r[0]][normalizeSlot(r[1])]) || [];
        if (!slotAvail.includes(djName)) return; // no confirmed availability → exclude
      }
      const k = norm(djName);
      loveNorm[k] = (loveNorm[k] || 0) + 1;
    });
    const report = djs
      .map(dj => {
        const ark  = arkNorm[norm(dj.name)]  || 0;
        const hip  = hipNorm[norm(dj.name)]  || 0;
        const love = loveNorm[norm(dj.name)] || 0;
        const total = ark + hip + love;
        const signedOff = signedOffMap[dj.name] || 0;
        const cost = dj.name === 'Guest DJ' ? 0 : signedOff * dj.rate;
        return { name: dj.name, arkbar: ark, hip, love, total, rate: dj.rate, cost, signedOff };
      })
      .filter(dj => dj.total > 0 && dj.name !== 'Guest DJ' && submittedDJs.get(dj.name) === 'submitted')
      .sort((a, b) => b.total - a.total);
    const grandTotal = report.reduce((s, d) => s + d.total, 0);
    const grandCost  = report.reduce((s, d) => s + d.cost,  0);
    showFinalizeReport({ month, report, grandTotal, grandCost }, true);
  } catch(e) {
    showToast('Preview error: ' + e.message, 'error');
  }
}

async function finalizeMonth() {
  const month = getMonthString();
  if (!confirm(`Finalise ${month}?\n\nThis will lock the month — DJs will no longer be able to edit availability for this period.\n\nThis cannot be undone.`)) return;

  const btn = $('finalizeBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Finalising…'; }

  try {
    const data = await fetch('/api/roster/finalize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month, password: adminPassword }),
    }).then(r => r.json());

    if (data.success) {
      showToast(`${month} finalised`, 'success');
      const area = $('finalizeArea');
      if (area) area.innerHTML = `<span class="finalized-pill">&#128274; Finalised</span>`;
      // Fetch signoffs and inject into report before showing
      try {
        const soRes = await fetch(`/api/signoffs/${encodeURIComponent(month)}`, { headers: { 'x-admin-password': adminPassword } }).then(r => r.json());
        const soMap = soRes.signedOff || {};
        if (data.report) data.report = data.report.map(dj => ({ ...dj, signedOff: soMap[dj.name] || 0 }));
      } catch(e) { /* non-fatal — signedOff will default to 0 */ }
      showFinalizeReport(data);
    } else {
      showToast(data.error || 'Finalise failed', 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Finalise Month'; }
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Finalise Month'; }
  }
}

function showFinalizeReport(data, isPreview = false) {
  const { month } = data;
  const BAHT = '\u0E3F';

  // Exclude DJs who haven't submitted availability and zero-hour entries
  const report = (data.report || []).filter(dj =>
    dj.total > 0 && dj.name !== 'Guest DJ' && submittedDJs.get(dj.name) === 'submitted'
  );
  // Normalise cost to signedOff × rate so both preview and finalise paths agree
  const reportWithCost = report.map(dj => ({ ...dj, cost: (dj.signedOff || 0) * (dj.rate || 0) }));
  const grandTotal     = reportWithCost.reduce((s, d) => s + d.total, 0);
  const grandCost      = reportWithCost.reduce((s, d) => s + d.cost,  0);
  const grandSignedOff = reportWithCost.reduce((s, d) => s + (d.signedOff || 0), 0);
  const soCol = (so, tot) => so >= tot ? '#69f0ae' : so > 0 ? '#ffb74d' : 'rgba(255,255,255,0.3)';

  const rows = reportWithCost.map(dj => `<tr>
    <td style="font-weight:700;color:#fff">${dj.name}</td>
    <td class="r">${dj.arkbar > 0 ? dj.arkbar + 'h' : '\u2014'}</td>
    <td class="r">${dj.hip   > 0 ? dj.hip   + 'h' : '\u2014'}</td>
    <td class="r">${dj.love  > 0 ? dj.love  + 'h' : '\u2014'}</td>
    <td class="r"><strong>${dj.total}h</strong></td>
    <td class="r" style="color:${soCol(dj.signedOff||0,dj.total)};font-weight:700">${dj.signedOff||0}/${dj.total}h</td>
    <td class="fin-col-rate r">${BAHT}${dj.rate.toLocaleString()}/h</td>
    <td class="fin-col-cost r" style="color:var(--teal);font-weight:800">${BAHT}${dj.cost.toLocaleString()}</td>
    <td class="fin-col-combined r"><span style="font-size:10px;opacity:.65">${BAHT}${dj.rate.toLocaleString()}/h &times; ${dj.signedOff||0}h</span><br><strong style="color:var(--teal)">${BAHT}${dj.cost.toLocaleString()}</strong></td>
  </tr>`).join('');

  const headerIcon  = isPreview ? '&#128196;' : '&#128274;';
  const headerLabel = isPreview ? `${month} \u2014 Accounting Preview` : `${month} \u2014 Accounting Report`;
  const previewBanner = isPreview
    ? `<div class="preview-banner">&#9888; PREVIEW \u2014 NOT FINALISED \u2014 No data has been saved</div>`
    : '';
  const extraBtns = isPreview
    ? `<button class="finalize-btn" style="font-size:11px;padding:7px 14px" onclick="closeFinalizeModal();finalizeMonth()">&#128274; Finalise Month</button>`
    : '';

  const modal = document.createElement('div');
  modal.className = 'fin-modal-overlay';
  modal.id = 'finalizeModal';
  modal.innerHTML = `<div class="fin-modal">
    <div class="fin-modal-hdr">
      <h2>${headerIcon} ${headerLabel}</h2>
      <div class="fin-modal-hdr-btns">
        ${extraBtns}
        <button class="fin-print-btn" onclick="printFinalizeReport(${isPreview})">&#128438; ${isPreview ? 'Print Preview' : 'Print'}</button>
        <button class="fin-close-btn" onclick="closeFinalizeModal()">&#x2715;</button>
      </div>
    </div>
    <div class="fin-modal-body" id="finalizeReportBody">
      ${previewBanner}
      <div class="fin-summary">
        <div class="fin-card"><div class="fin-card-label">Total Hours</div><div class="fin-card-val">${grandTotal}h</div></div>
        <div class="fin-card"><div class="fin-card-label">Total Cost</div><div class="fin-card-val" style="color:var(--teal);font-size:18px">${BAHT}${grandCost.toLocaleString()}</div></div>
        <div class="fin-card"><div class="fin-card-label">Signed Off</div><div class="fin-card-val" style="color:${soCol(grandSignedOff,grandTotal)};font-size:16px">${grandSignedOff}/${grandTotal}h</div></div>
        <div class="fin-card"><div class="fin-card-label">DJs Paid</div><div class="fin-card-val">${report.length}</div></div>
        <div class="fin-card"><div class="fin-card-label">Period</div><div class="fin-card-val" style="font-size:13px">${month}</div></div>
      </div>
      <table class="fin-table">
        <thead><tr>
          <th>DJ</th><th class="r">ARKbar</th><th class="r">HIP</th><th class="r">Love Beach</th>
          <th class="r">Total</th><th class="r">Signed Off</th><th class="fin-col-rate r">Rate</th><th class="fin-col-cost r">Cost</th><th class="fin-col-combined r">Rate &amp; Cost</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td colspan="4">Grand Total</td>
          <td class="r">${grandTotal}h</td>
          <td class="r" style="color:${soCol(grandSignedOff,grandTotal)};font-weight:800">${grandSignedOff}/${grandTotal}h</td>
          <td class="fin-col-rate"></td>
          <td class="fin-col-cost r">${BAHT}${grandCost.toLocaleString()}</td>
          <td class="fin-col-combined r">${BAHT}${grandCost.toLocaleString()}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`;

  modal.addEventListener('click', e => { if (e.target === modal) closeFinalizeModal(); });
  document.body.appendChild(modal);
}
