name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if branch has any commits ahead of main
            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner, repo,
              basehead: `main...${branch}`
            }).catch(() => null);

            if (!comparison || comparison.data.ahead_by === 0) {
              console.log('Branch is not ahead of main — nothing to merge.');
              return;
            }
            console.log(`Branch is ${comparison.data.ahead_by} commit(s) ahead of main.`);

            // Find or create an open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              base: 'main',
              state: 'open'
            });

            let prNumber;

            if (prs.length === 0) {
              try {
                const { data: pr } = await github.rest.pulls.create({
                  owner, repo,
                  title: `Claude update: ${new Date().toISOString().slice(0,10)}`,
                  head: branch,
                  base: 'main',
                  body: 'Automated update from Claude Code session.'
                });
                prNumber = pr.number;
                console.log(`Created PR #${prNumber}`);
              } catch (err) {
                console.log(`Could not create PR: ${err.message}`);
                return;
              }
            } else {
              prNumber = prs[0].number;
              console.log(`Found existing PR #${prNumber}`);
            }

            // Wait for GitHub to mark the PR as mergeable
            let mergeable = false;
            for (let i = 0; i < 6; i++) {
              await new Promise(r => setTimeout(r, 3000));
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              if (pr.merged) { console.log('PR already merged.'); return; }
              if (pr.state === 'closed') { console.log('PR closed — skipping.'); return; }
              if (pr.mergeable === true) { mergeable = true; break; }
              console.log(`Waiting for mergeable status (attempt ${i + 1}/6)…`);
            }

            if (!mergeable) {
              console.log('PR is not mergeable (possible conflict). Skipping auto-merge.');
              return;
            }

            // Merge the PR
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'merge'
              });
              console.log(`Merged PR #${prNumber} into main`);
            } catch (err) {
              console.log(`Merge failed: ${err.message}`);
            }
