name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find existing open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              base: 'main',
              state: 'open'
            });

            let prNumber;

            if (prs.length === 0) {
              // Create a new PR
              const { data: pr } = await github.rest.pulls.create({
                owner, repo,
                title: `Claude update: ${new Date().toISOString().slice(0,10)}`,
                head: branch,
                base: 'main',
                body: 'Automated update from Claude Code session.'
              });
              prNumber = pr.number;
              console.log(`Created PR #${prNumber}`);
            } else {
              prNumber = prs[0].number;
              console.log(`Found existing PR #${prNumber}`);
            }

            // Merge the PR
            await github.rest.pulls.merge({
              owner, repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });

            console.log(`Merged PR #${prNumber} into main`);
